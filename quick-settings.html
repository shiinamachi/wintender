<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>wintender Quick Settings</title>
        <style>
            :root {
                --panel-bg: rgba(24, 24, 30, 0.94);
                --panel-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
                --border: rgba(255, 255, 255, 0.06);
                --text-primary: #e0e0e0;
                --text-secondary: #808080;
                --hover: rgba(255, 255, 255, 0.1);
                --accent: #89b4fa;
                --warning: #f38ba8;
                --card-bg: rgba(255, 255, 255, 0.04);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
            }

            body {
                font-family:
                    "JetBrainsMonohangul NF Regular", "JetBrainsMono Nerd Font",
                    "CaskaydiaCove Nerd Font", "Segoe UI", monospace;
                color: var(--text-primary);
                background: transparent;
                user-select: none;
            }

            button,
            input {
                font: inherit;
            }

            button {
                border: 0;
                color: inherit;
                background: transparent;
            }

            .panel {
                display: flex;
                flex-direction: column;
                width: 100%;
                height: 100%;
                padding: 14px;
                border: 1px solid var(--border);
                border-radius: 14px;
                background: var(--panel-bg);
                backdrop-filter: blur(18px);
                -webkit-backdrop-filter: blur(18px);
                box-shadow: var(--panel-shadow);
            }

            .panel-header {
                display: flex;
                align-items: center;
                gap: 12px;
                flex: 0 0 auto;
            }

            .header-actions {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-left: auto;
                flex: 0 0 auto;
            }

            .panel-body {
                display: flex;
                flex: 1 1 auto;
                flex-direction: column;
                gap: 14px;
                min-height: 0;
                overflow: auto;
                padding-right: 4px;
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.16) transparent;
            }

            .panel-body::-webkit-scrollbar {
                width: 10px;
            }

            .panel-body::-webkit-scrollbar-track {
                background: transparent;
            }

            .panel-body::-webkit-scrollbar-thumb {
                border: 2px solid transparent;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.16);
                background-clip: padding-box;
            }

            .panel-body::-webkit-scrollbar-thumb:hover {
                background: rgba(137, 180, 250, 0.38);
                background-clip: padding-box;
            }

            .header-copy {
                display: flex;
                flex-direction: column;
                gap: 2px;
                min-width: 0;
            }

            .header-title {
                font-size: 14px;
                font-weight: 700;
            }

            .icon-button {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 28px;
                height: 28px;
                border-radius: 8px;
                cursor: pointer;
                transition: background 0.15s ease;
            }

            .icon-button:hover,
            .ghost-button:hover,
            .action-tile:hover,
            .list-button:hover {
                background: var(--hover);
            }

            .summary-grid {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 10px;
            }

            .summary-card {
                display: flex;
                flex-direction: column;
                gap: 8px;
                min-width: 0;
                padding: 10px;
                border-radius: 12px;
                background: var(--card-bg);
            }

            .summary-icon {
                font-size: 16px;
                line-height: 1;
            }

            .summary-label {
                color: var(--text-secondary);
                font-size: 11px;
            }

            .summary-value {
                font-size: 12px;
                line-height: 1.35;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .controls {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .control-card {
                display: flex;
                align-items: center;
                gap: 10px;
                min-width: 0;
                padding: 10px 12px;
                border-radius: 12px;
                background: var(--card-bg);
            }

            .control-copy {
                display: flex;
                flex-direction: column;
                gap: 2px;
                min-width: 72px;
            }

            .control-title {
                font-size: 12px;
            }

            .control-value {
                color: var(--text-secondary);
                font-size: 11px;
            }

            .control-slider {
                flex: 1 1 auto;
                min-width: 0;
                accent-color: var(--accent);
            }

            .ghost-button {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                flex: 0 0 auto;
                min-width: 34px;
                height: 30px;
                padding: 0 10px;
                border-radius: 9px;
                cursor: pointer;
                transition: background 0.15s ease;
            }

            .actions-grid {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                grid-auto-rows: minmax(78px, auto);
                gap: 10px;
                min-height: 0;
            }

            .action-tile {
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                gap: 8px;
                height: auto;
                min-height: 78px;
                padding: 10px;
                border-radius: 12px;
                background: var(--card-bg);
                cursor: pointer;
                text-align: left;
                transition: background 0.15s ease, transform 0.15s ease;
            }

            .action-tile:active {
                transform: translateY(1px);
            }

            .action-icon {
                font-size: 16px;
                line-height: 1;
            }

            .action-label {
                font-size: 12px;
                line-height: 1.3;
                white-space: normal;
                overflow-wrap: anywhere;
            }

            .action-meta {
                color: var(--text-secondary);
                font-size: 11px;
                line-height: 1.3;
            }

            .list-view {
                display: flex;
                flex-direction: column;
                gap: 12px;
                min-height: 0;
                height: 100%;
            }

            .list-header {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .list-copy {
                display: flex;
                flex-direction: column;
                gap: 2px;
                min-width: 0;
            }

            .list-title {
                font-size: 14px;
                font-weight: 700;
            }

            .list-subtitle {
                color: var(--text-secondary);
                font-size: 12px;
            }

            .list-stack {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .list-button {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 12px;
                width: 100%;
                height: auto;
                padding: 10px 12px;
                border-radius: 12px;
                background: var(--card-bg);
                cursor: pointer;
                text-align: left;
                transition: background 0.15s ease;
            }

            .list-main {
                display: flex;
                align-items: center;
                gap: 10px;
                min-width: 0;
            }

            .list-meta {
                display: flex;
                flex-direction: column;
                gap: 2px;
                min-width: 0;
            }

            .list-title-text,
            .list-subtitle-text {
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .list-title-text {
                font-size: 12px;
                white-space: normal;
                overflow-wrap: anywhere;
            }

            .list-subtitle-text {
                color: var(--text-secondary);
                font-size: 11px;
                white-space: normal;
                overflow-wrap: anywhere;
            }

            .list-tag {
                flex: 0 0 auto;
                color: var(--text-secondary);
                font-size: 11px;
            }

            .empty-state {
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 16px 0;
                color: var(--text-secondary);
                text-align: center;
                font-size: 12px;
            }

            .hidden {
                display: none !important;
            }
        </style>
    </head>
    <body>
        <div id="panel" class="panel"></div>

        <script type="module">
            import * as zebar from "https://esm.sh/zebar@3.1.1?bundle";

            const POWERSHELL_BASE_ARGS = [
                "-NoProfile",
                "-NonInteractive",
                "-WindowStyle",
                "Hidden",
                "-Command",
            ];
            const SETTINGS_DEEP_LINKS = {
                bluetooth: "ms-settings:bluetooth",
                airplaneMode: "ms-settings:network-airplanemode",
                mobileHotspot: "ms-settings:network-mobilehotspot",
                energySaver: "ms-settings:batterysaver",
                nightLight: "ms-settings:nightlight",
                nearbySharing: "ms-settings:crossdevice",
                outputDevice: "ms-settings:sound-devices",
                studioEffects: "ms-settings:camera",
                castProject: "ms-settings:project",
                wifiSettings: "ms-settings:network-wifi",
                cellularSettings: "ms-settings:network-cellular",
                vpnSettings: "ms-settings:network-vpn",
                display: "ms-settings:display",
            };
            const ACCESSIBILITY_LINKS = [
                {
                    icon: "󰍡",
                    label: "Narrator",
                    uri: "ms-settings:easeofaccess-narrator",
                },
                {
                    icon: "󰍹",
                    label: "Magnifier",
                    uri: "ms-settings:easeofaccess-magnifier",
                },
                {
                    icon: "󰸌",
                    label: "Color Filters",
                    uri: "ms-settings:easeofaccess-colorfilter",
                },
                {
                    icon: "󰌌",
                    label: "Keyboard",
                    uri: "ms-settings:easeofaccess-keyboard",
                },
            ];
            const SUPPLEMENTAL_REFRESH_INTERVAL = 15000;
            const VOLUME_STEP = 5;
            const BRIGHTNESS_QUERY_SCRIPT =
                "$ErrorActionPreference = 'Stop'; try { $value = Get-CimInstance -Namespace root/WMI -ClassName WmiMonitorBrightness | Select-Object -First 1 -ExpandProperty CurrentBrightness; @{ supported = $true; value = [int]$value } | ConvertTo-Json -Compress } catch { @{ supported = $false; value = $null } | ConvertTo-Json -Compress }";
            const VPN_QUERY_SCRIPT =
                "$ErrorActionPreference = 'Stop'; try { $items = @(Get-VpnConnection | Select-Object -Property Name, ConnectionStatus); if ($items.Count -eq 0) { '[]' } else { $items | ConvertTo-Json -Compress } } catch { '[]' }";
            const STUDIO_EFFECTS_QUERY_SCRIPT =
                "$ErrorActionPreference = 'SilentlyContinue'; $camera = @(Get-CimInstance Win32_PnPEntity | Where-Object { $_.PNPClass -eq 'Camera' } | Select-Object -First 1); @{ supported = ($camera.Count -gt 0) } | ConvertTo-Json -Compress";

            const panel = document.getElementById("panel");
            const widget = zebar.currentWidget();
            const providers = zebar.createProviderGroup({
                battery: { type: "battery", refreshInterval: 10000 },
                network: { type: "network", refreshInterval: 5000 },
                audio: { type: "audio" },
            });
            const state = {
                output: {
                    battery: null,
                    network: null,
                    audio: null,
                },
                view: "main",
                brightness: {
                    supported: false,
                    value: 50,
                    isLoading: true,
                },
                wifi: {
                    items: [],
                    isLoading: false,
                    lastUpdatedAt: 0,
                },
                cellular: {
                    interfaces: [],
                    profiles: [],
                    activeInterfaceName: "",
                    isConnected: false,
                    isLoading: false,
                    lastUpdatedAt: 0,
                },
                vpn: {
                    items: [],
                    isLoading: false,
                    lastUpdatedAt: 0,
                },
                studioEffects: {
                    supported: false,
                    isLoading: true,
                },
            };
            let supplementalRefreshTimer = null;

            function clearElement(element) {
                while (element.firstChild) {
                    element.removeChild(element.firstChild);
                }
            }

            function clamp(value, min, max) {
                return Math.min(Math.max(value, min), max);
            }

            function normalizeText(text) {
                return typeof text === "string" ? text.trim() : "";
            }

            function quotePowerShellScript(script) {
                return `"${script.replace(/"/g, '\\"')}"`;
            }

            function buildPowerShellArgs(script) {
                return `${POWERSHELL_BASE_ARGS.join(" ")} ${quotePowerShellScript(script)}`;
            }

            function buildPowerShellSpawnArgs(script) {
                return [...POWERSHELL_BASE_ARGS, script];
            }

            function getSignalLevel(signalStrength) {
                if (!Number.isFinite(signalStrength)) {
                    return null;
                }

                if (signalStrength < 25) {
                    return 0;
                }

                if (signalStrength < 50) {
                    return 1;
                }

                if (signalStrength < 75) {
                    return 2;
                }

                return 3;
            }

            function getWifiSignalIcon(signalStrength) {
                const level = getSignalLevel(signalStrength);
                const icons = ["󰤟", "󰤢", "󰤥", "󰤨"];

                return level === null ? "󰤨" : icons[level];
            }

            function getCellularSignalIcon(signalStrength) {
                const level = getSignalLevel(signalStrength);
                const icons = ["󰢿", "󰢼", "󰢽", "󰢾"];

                return level === null ? "󰢿" : icons[level];
            }

            function isCellularInterfaceType(interfaceType) {
                return (
                    interfaceType === "mobile_broadband" ||
                    interfaceType === "generic_modem" ||
                    interfaceType === "ppp"
                );
            }

            function getDefaultInterface(networkOutput) {
                return networkOutput?.defaultInterface ?? null;
            }

            function getBatterySummary(batteryOutput) {
                if (
                    !batteryOutput ||
                    typeof batteryOutput.chargePercent !== "number"
                ) {
                    return null;
                }

                const percent = Math.round(batteryOutput.chargePercent);
                let icon = "󰁹";

                if (batteryOutput.isCharging) {
                    icon = "󰂄";
                } else if (percent >= 90) {
                    icon = "󰁹";
                } else if (percent >= 60) {
                    icon = "󰂁";
                } else if (percent >= 30) {
                    icon = "󰁾";
                } else if (percent >= 10) {
                    icon = "󰁻";
                } else {
                    icon = "󰂎";
                }

                return {
                    icon,
                    label: "Battery",
                    value: `${percent}%`,
                };
            }

            function getAudioSummary(audioOutput) {
                const device = audioOutput?.defaultPlaybackDevice ?? null;

                if (!device) {
                    return null;
                }

                const volume = Math.round(device.volume ?? 0);
                const isMuted = Boolean(device.isMuted) || volume === 0;
                let icon = "󰕾";

                if (isMuted) {
                    icon = "󰖁";
                } else if (volume <= 33) {
                    icon = "󰕿";
                } else if (volume <= 66) {
                    icon = "󰖀";
                }

                return {
                    icon,
                    label: "Audio",
                    value: `${volume}%`,
                    volume,
                    isMuted,
                    deviceId: device.deviceId,
                    deviceName: normalizeText(device.friendlyName) || "Playback",
                };
            }

            function getNetworkSummary(networkOutput) {
                const defaultInterface = getDefaultInterface(networkOutput);
                const gateway = networkOutput?.defaultGateway ?? null;

                if (!defaultInterface) {
                    return {
                        icon: "󰤭",
                        label: "Network",
                        value: "No Network",
                        isWifi: false,
                    };
                }

                if (defaultInterface.type === "wifi") {
                    const signalStrength = Number(gateway?.signalStrength);

                    return {
                        icon: getWifiSignalIcon(signalStrength),
                        label: "Wi-Fi",
                        value:
                            normalizeText(gateway?.ssid) ||
                            normalizeText(defaultInterface.friendlyName) ||
                            "Wi-Fi",
                        isWifi: true,
                    };
                }

                if (defaultInterface.type === "ethernet") {
                    return {
                        icon: "󰈀",
                        label: "Network",
                        value: "Ethernet",
                        isWifi: false,
                    };
                }

                return {
                    icon: "󰤭",
                    label: "Network",
                    value:
                        normalizeText(defaultInterface.friendlyName) ||
                        normalizeText(defaultInterface.name) ||
                        "Network",
                    isWifi: false,
                };
            }

            function getCellularSummary(networkOutput, cellularState) {
                const defaultInterface = getDefaultInterface(networkOutput);
                const activeName =
                    normalizeText(defaultInterface?.friendlyName) ||
                    normalizeText(defaultInterface?.description) ||
                    normalizeText(defaultInterface?.name) ||
                    normalizeText(cellularState.activeInterfaceName);
                const activeInterface = cellularState.interfaces.find(
                    (item) => normalizeText(item.name) === activeName,
                );
                const signalStrength = Number(
                    activeInterface?.signalStrength ??
                        defaultInterface?.signalStrength ??
                        defaultInterface?.signalPercent ??
                        null,
                );
                const isConnected =
                    isCellularInterfaceType(defaultInterface?.type) ||
                    Boolean(cellularState.isConnected);

                if (!activeName && !cellularState.interfaces.length) {
                    return null;
                }

                return {
                    icon: getCellularSignalIcon(signalStrength),
                    label: "Cellular",
                    value:
                        activeName ||
                        normalizeText(activeInterface?.description) ||
                        "Cellular",
                    meta: isConnected
                        ? "Connected"
                        : normalizeText(activeInterface?.state) || "Available",
                    isConnected,
                };
            }

            function buildBrightnessSetScript(value) {
                const nextValue = clamp(Math.round(value), 0, 100);

                return `$ErrorActionPreference = 'Stop'; Get-CimInstance -Namespace root/WMI -ClassName WmiMonitorBrightnessMethods | Invoke-CimMethod -MethodName WmiSetBrightness -Arguments @{ Brightness = ${nextValue}; Timeout = 0 } | Out-Null`;
            }

            function ensureArray(value) {
                if (Array.isArray(value)) {
                    return value;
                }

                return value ? [value] : [];
            }

            function parseJson(stdout) {
                const text = normalizeText(stdout);

                if (!text) {
                    return null;
                }

                try {
                    return JSON.parse(text);
                } catch (error) {
                    console.error("Failed to parse JSON shell output", error);
                    return null;
                }
            }

            function setStatus() {}

            async function execPowerShell(script) {
                return zebar.shellExec(
                    "powershell.exe",
                    buildPowerShellArgs(script),
                );
            }

            async function openSettings(uri, message) {
                try {
                    await zebar.shellSpawn(
                        "powershell.exe",
                        buildPowerShellSpawnArgs(`Start-Process '${uri}'`),
                    );

                    if (message) {
                        setStatus(message);
                    }
                } catch (error) {
                    console.error("Failed to open settings link", error);
                    setStatus("Failed to open Windows Settings", "warning");
                }
            }

            function parseWifiNetworks(stdout, networkOutput) {
                const lines = String(stdout || "").split(/\r?\n/);
                const connectedSsid = normalizeText(
                    networkOutput?.defaultGateway?.ssid,
                );
                const items = [];
                let current = null;

                lines.forEach((line) => {
                    const ssidMatch = line.match(/^\s*SSID\s+\d+\s*:\s*(.*)$/i);

                    if (ssidMatch) {
                        const ssid = normalizeText(ssidMatch[1]);

                        if (!ssid) {
                            current = null;
                            return;
                        }

                        current = {
                            id: ssid.toLowerCase(),
                            ssid,
                            signalStrength: null,
                            isConnected: connectedSsid === ssid,
                        };
                        items.push(current);
                        return;
                    }

                    const signalMatch = line.match(
                        /^\s*Signal\s*:\s*(\d+)%\s*$/i,
                    );

                    if (signalMatch && current && current.signalStrength === null) {
                        current.signalStrength = clamp(
                            Number(signalMatch[1]),
                            0,
                            100,
                        );
                    }
                });

                const unique = new Map();

                items.forEach((item) => {
                    const previous = unique.get(item.id);

                    if (
                        !previous ||
                        (item.signalStrength ?? -1) >
                            (previous.signalStrength ?? -1)
                    ) {
                        unique.set(item.id, item);
                    }
                });

                return Array.from(unique.values()).sort((left, right) => {
                    if (left.isConnected !== right.isConnected) {
                        return left.isConnected ? -1 : 1;
                    }

                    return (right.signalStrength ?? -1) - (left.signalStrength ?? -1);
                });
            }

            function parseCellularInterfaces(stdout, networkOutput) {
                const lines = String(stdout || "").split(/\r?\n/);
                const defaultInterface = getDefaultInterface(networkOutput);
                const activeName =
                    normalizeText(defaultInterface?.friendlyName) ||
                    normalizeText(defaultInterface?.description) ||
                    normalizeText(defaultInterface?.name);
                const interfaces = [];
                let current = null;

                lines.forEach((line) => {
                    const match = line.match(/^\s*([^:]+?)\s*:\s*(.*?)\s*$/);

                    if (!match) {
                        return;
                    }

                    const key = normalizeText(match[1]).toLowerCase();
                    const value = normalizeText(match[2]);

                    if (key === "name") {
                        current = {
                            name: value,
                            description: "",
                            state: "",
                            signalStrength: null,
                            isConnected: value === activeName,
                        };
                        interfaces.push(current);
                        return;
                    }

                    if (!current) {
                        return;
                    }

                    if (key === "description") {
                        current.description = value;
                    } else if (key === "state") {
                        current.state = value;
                    } else if (key === "signal") {
                        const valueMatch = value.match(/(\d+)%/);
                        current.signalStrength = valueMatch
                            ? clamp(Number(valueMatch[1]), 0, 100)
                            : null;
                    }
                });

                return interfaces;
            }

            function parseCellularProfiles(stdout, interfaceName, isConnected) {
                const lines = String(stdout || "").split(/\r?\n/);
                const profiles = [];
                const seen = new Set();

                lines.forEach((line) => {
                    const match = line.match(
                        /^\s*(?:profile(?:\s+name)?|name)\s*:\s*(.+)$/i,
                    );

                    if (!match) {
                        return;
                    }

                    const name = normalizeText(match[1]);

                    if (!name || seen.has(name.toLowerCase())) {
                        return;
                    }

                    seen.add(name.toLowerCase());
                    profiles.push({
                        interfaceName,
                        name,
                        isConnected,
                    });
                });

                return profiles;
            }

            function hasCellularCapability(networkOutput, cellularState) {
                if (cellularState.interfaces.length > 0) {
                    return true;
                }

                return isCellularInterfaceType(getDefaultInterface(networkOutput)?.type);
            }

            async function refreshBrightness() {
                state.brightness.isLoading = true;
                render();

                try {
                    const result = await execPowerShell(BRIGHTNESS_QUERY_SCRIPT);
                    const payload = parseJson(result.stdout);

                    state.brightness.supported = Boolean(payload?.supported);
                    state.brightness.value = clamp(
                        Number(payload?.value ?? state.brightness.value),
                        0,
                        100,
                    );
                } catch (error) {
                    console.error("Failed to query brightness", error);
                    state.brightness.supported = false;
                } finally {
                    state.brightness.isLoading = false;
                    render();
                }
            }

            async function refreshWifiNetworks(force = false) {
                const now = Date.now();

                if (
                    !force &&
                    state.wifi.lastUpdatedAt &&
                    now - state.wifi.lastUpdatedAt < SUPPLEMENTAL_REFRESH_INTERVAL
                ) {
                    return;
                }

                state.wifi.isLoading = true;
                render();

                try {
                    const result = await zebar.shellExec(
                        "netsh.exe",
                        "wlan show networks mode=bssid",
                    );
                    state.wifi.items = parseWifiNetworks(
                        result.stdout,
                        state.output.network,
                    );
                    state.wifi.lastUpdatedAt = Date.now();
                } catch (error) {
                    console.error("Failed to query Wi-Fi networks", error);
                    state.wifi.items = [];
                    setStatus("Wi-Fi settings opened instead", "warning");
                } finally {
                    state.wifi.isLoading = false;
                    render();
                }
            }

            async function refreshCellularState(force = false) {
                const now = Date.now();

                if (
                    !force &&
                    state.cellular.lastUpdatedAt &&
                    now - state.cellular.lastUpdatedAt <
                        SUPPLEMENTAL_REFRESH_INTERVAL
                ) {
                    return;
                }

                state.cellular.isLoading = true;
                render();

                try {
                    const interfacesResult = await zebar.shellExec(
                        "netsh.exe",
                        "mbn show interfaces",
                    );
                    const interfaces = parseCellularInterfaces(
                        interfacesResult.stdout,
                        state.output.network,
                    );
                    const defaultInterface = getDefaultInterface(state.output.network);
                    const activeInterfaceName =
                        normalizeText(defaultInterface?.friendlyName) ||
                        normalizeText(defaultInterface?.description) ||
                        normalizeText(defaultInterface?.name) ||
                        normalizeText(interfaces[0]?.name);
                    const profiles = [];

                    for (const item of interfaces) {
                        try {
                            const profileResult = await zebar.shellExec(
                                "netsh.exe",
                                `mbn show profiles interface="${item.name}"`,
                            );

                            profiles.push(
                                ...parseCellularProfiles(
                                    profileResult.stdout,
                                    item.name,
                                    item.isConnected,
                                ),
                            );
                        } catch (error) {
                            console.error(
                                "Failed to query cellular profiles",
                                error,
                            );
                        }
                    }

                    state.cellular.interfaces = interfaces;
                    state.cellular.profiles = profiles;
                    state.cellular.activeInterfaceName = activeInterfaceName;
                    state.cellular.isConnected = isCellularInterfaceType(
                        defaultInterface?.type,
                    );
                    state.cellular.lastUpdatedAt = Date.now();
                } catch (error) {
                    console.error("Failed to query cellular state", error);
                    state.cellular.interfaces = [];
                    state.cellular.profiles = [];
                    state.cellular.activeInterfaceName = "";
                    state.cellular.isConnected = false;
                } finally {
                    state.cellular.isLoading = false;
                    render();
                }
            }

            async function refreshVpnConnections(force = false) {
                const now = Date.now();

                if (
                    !force &&
                    state.vpn.lastUpdatedAt &&
                    now - state.vpn.lastUpdatedAt < SUPPLEMENTAL_REFRESH_INTERVAL
                ) {
                    return;
                }

                state.vpn.isLoading = true;
                render();

                try {
                    const result = await execPowerShell(VPN_QUERY_SCRIPT);
                    const payload = parseJson(result.stdout);

                    state.vpn.items = ensureArray(payload).map((item) => ({
                        name: normalizeText(item?.Name) || "VPN",
                        isConnected:
                            normalizeText(item?.ConnectionStatus).toLowerCase() ===
                            "connected",
                    }));
                    state.vpn.lastUpdatedAt = Date.now();
                } catch (error) {
                    console.error("Failed to query VPN connections", error);
                    state.vpn.items = [];
                } finally {
                    state.vpn.isLoading = false;
                    render();
                }
            }

            async function refreshStudioEffectsSupport() {
                state.studioEffects.isLoading = true;
                render();

                try {
                    const result = await execPowerShell(
                        STUDIO_EFFECTS_QUERY_SCRIPT,
                    );
                    const payload = parseJson(result.stdout);

                    state.studioEffects.supported = Boolean(payload?.supported);
                } catch (error) {
                    console.error("Failed to query Studio Effects support", error);
                    state.studioEffects.supported = false;
                } finally {
                    state.studioEffects.isLoading = false;
                    render();
                }
            }

            async function setBrightness(value) {
                const nextValue = clamp(Number(value), 0, 100);

                state.brightness.value = nextValue;
                render();

                try {
                    await execPowerShell(buildBrightnessSetScript(nextValue));
                    setStatus(`Brightness ${nextValue}%`);
                } catch (error) {
                    console.error("Failed to set brightness", error);
                    setStatus("Opening display settings instead", "warning");
                    await openSettings(
                        SETTINGS_DEEP_LINKS.display,
                        "Display settings opened",
                    );
                }
            }

            async function toggleMute() {
                const audioSummary = getAudioSummary(state.output.audio);

                if (!audioSummary) {
                    return;
                }

                state.output.audio.setMute?.(!audioSummary.isMuted, {
                    deviceId: audioSummary.deviceId,
                });
            }

            async function setVolume(value) {
                const audioSummary = getAudioSummary(state.output.audio);

                if (!audioSummary) {
                    return;
                }

                state.output.audio.setVolume?.(clamp(Number(value), 0, 100), {
                    deviceId: audioSummary.deviceId,
                });
            }

            async function adjustVolume(delta) {
                const audioSummary = getAudioSummary(state.output.audio);

                if (!audioSummary) {
                    return;
                }

                const nextVolume = clamp(audioSummary.volume + delta, 0, 100);
                await setVolume(nextVolume);
            }

            async function connectWifi(ssid) {
                try {
                    const args = [`wlan connect name="${ssid}" ssid="${ssid}"`];
                    await zebar.shellExec("netsh.exe", args[0]);
                    setStatus(`Connecting to ${ssid}`);
                    await refreshWifiNetworks(true);
                } catch (error) {
                    console.error("Failed to connect Wi-Fi network", error);
                    setStatus("Opening Wi-Fi settings instead", "warning");
                    await openSettings(
                        SETTINGS_DEEP_LINKS.wifiSettings,
                        "Wi-Fi settings opened",
                    );
                }
            }

            async function connectCellular(profile) {
                try {
                    await zebar.shellExec(
                        "netsh.exe",
                        `mbn connect interface="${profile.interfaceName}" connmode=name name="${profile.name}"`,
                    );
                    setStatus(`Connecting ${profile.name}`);
                    await refreshCellularState(true);
                } catch (error) {
                    console.error("Failed to connect cellular profile", error);
                    setStatus("Opening Cellular settings instead", "warning");
                    await openSettings(
                        SETTINGS_DEEP_LINKS.cellularSettings,
                        "Cellular settings opened",
                    );
                }
            }

            async function disconnectCellular(interfaceName) {
                try {
                    await zebar.shellExec(
                        "netsh.exe",
                        `mbn disconnect interface="${interfaceName}"`,
                    );
                    setStatus(`Disconnecting ${interfaceName}`);
                    await refreshCellularState(true);
                } catch (error) {
                    console.error("Failed to disconnect cellular interface", error);
                    setStatus("Opening Cellular settings instead", "warning");
                    await openSettings(
                        SETTINGS_DEEP_LINKS.cellularSettings,
                        "Cellular settings opened",
                    );
                }
            }

            async function toggleVpnConnection(connection) {
                const args = connection.isConnected
                    ? `"${connection.name}" /disconnect`
                    : `"${connection.name}"`;

                try {
                    await zebar.shellExec("rasdial.exe", args);
                    setStatus(
                        connection.isConnected
                            ? `Disconnecting ${connection.name}`
                            : `Connecting ${connection.name}`,
                    );
                    await refreshVpnConnections(true);
                } catch (error) {
                    console.error("Failed to toggle VPN connection", error);
                    setStatus("Opening VPN settings instead", "warning");
                    await openSettings(
                        SETTINGS_DEEP_LINKS.vpnSettings,
                        "VPN settings opened",
                    );
                }
            }

                state.view = view;

            function createControlCard({
                icon,
                title,
                value,
                min = 0,
                max = 100,
                currentValue = 0,
                onInput,
                inputEventName = "input",
                trailingButton = null,
            }) {
                const card = document.createElement("div");
                const glyph = document.createElement("div");
                const copy = document.createElement("div");
                const titleElement = document.createElement("div");
                const valueElement = document.createElement("div");
                const slider = document.createElement("input");

                card.className = "control-card";
                glyph.className = "summary-icon";
                glyph.textContent = icon;
                copy.className = "control-copy";
                titleElement.className = "control-title";
                titleElement.textContent = title;
                valueElement.className = "control-value";
                valueElement.textContent = value;
                copy.append(titleElement, valueElement);

                slider.className = "control-slider";
                slider.type = "range";
                slider.min = String(min);
                slider.max = String(max);
                slider.value = String(currentValue);
                slider.addEventListener(inputEventName, (event) => {
                    onInput?.(Number(event.currentTarget.value));
                });

                card.append(glyph, copy, slider);

                if (trailingButton) {
                    card.appendChild(trailingButton);
                }

                return card;
            }

            function renderListView({
                title,

                onBack,

                emptyText,

                const titleElement = document.createElement("div");
                const subtitleElement = document.createElement("div");
                const body = document.createElement("div");
                const list = document.createElement("div");
                const backButton = createIconButton("󰅁", "Back", onBack);
                const refreshButton = createIconButton("󰑐", "Refresh", onRefresh);

                    ? createIconButton("󰒓", "Settings", onOpenSettings)
                    : null;

                header.className = "list-header";
                headerCopy.className = "list-copy";
                headerActions.className = "header-actions";
                titleElement.className = "list-title";
                subtitleElement.className = "list-subtitle";
                titleElement.textContent = title;
                subtitleElement.textContent = subtitle;
                headerCopy.append(titleElement, subtitleElement);
                headerActions.append(backButton);
                if (settingsButton) {
                    headerActions.append(settingsButton);
                }
                headerActions.append(refreshButton);
                header.append(headerCopy, headerActions);

                list.className = "list-stack";

                if (!items.length) {
                    const empty = document.createElement("div");

                    empty.className = "empty-state";
                    empty.textContent = emptyText;
                    list.appendChild(empty);
                } else {
                    items.forEach((item) => {
                        list.appendChild(item);
                    });
                }

                body.appendChild(list);
                fragment.append(header, body);
                return fragment;
            }

            function render() {
                clearElement(panel);

                if (state.view === "wifi") {
                    panel.appendChild(renderWifiView());
                    return;
                }

                if (state.view === "cellular") {
                    panel.appendChild(renderCellularView());
                    return;
                }

                if (state.view === "vpn") {
                    panel.appendChild(renderVpnView());
                    return;
                }

                if (state.view === "accessibility") {
                    panel.appendChild(renderAccessibilityView());
                    return;
                }

                panel.appendChild(renderMainView());
            }

            async function refreshSupplementalState(force = false) {
                await Promise.all([
                    refreshBrightness(),
                    refreshCellularState(force),
                    refreshVpnConnections(force),
                    refreshStudioEffectsSupport(),
                ]);
            }

            providers.onOutput((output) => {
                state.output = output;
                render();
            });

            providers.onError((error) => {
                console.error("Quick Settings provider error", error);
            });

            widget.tauriWindow.listen("tauri://blur", () => {
                widget.close();
            });

            window.addEventListener("keydown", (event) => {
                if (event.key === "Escape") {
                    widget.close();
                }
            });

            supplementalRefreshTimer = window.setInterval(() => {
                void refreshSupplementalState();
            }, SUPPLEMENTAL_REFRESH_INTERVAL);

            window.addEventListener("beforeunload", () => {
                if (supplementalRefreshTimer) {
                    clearInterval(supplementalRefreshTimer);
                }

            });

            render();
            void refreshSupplementalState(true);
        </script>
    </body>
</html>
