<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>wintender Top Bar</title>
        <style>
            :root {
                --bar-bg: rgba(20, 20, 25, 0.82);
                --text-primary: #e0e0e0;
                --text-secondary: #808080;
                --accent: #89b4fa;
                --warning: #f38ba8;
                --hover: rgba(255, 255, 255, 0.1);
                --border: rgba(255, 255, 255, 0.06);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                min-height: 32px;
                overflow: hidden;
            }

            body {
                position: relative;
                font-family:
                    "JetBrainsMonohangul NF Regular", "JetBrainsMono Nerd Font",
                    "CaskaydiaCove Nerd Font", "Segoe UI", monospace;
                font-size: 13px;
                color: var(--text-primary);
                user-select: none;
            }

            .bar {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
                align-items: center;
                gap: 12px;
                height: 32px;
                width: 100%;
                padding: 0 14px;
                background: var(--bar-bg);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border-bottom: 1px solid var(--border);
            }

            .section {
                display: flex;
                align-items: center;
                min-width: 0;
                gap: 12px;
            }

            .section-left {
                justify-content: flex-start;
                overflow: hidden;
            }

            .section-center {
                justify-content: center;
            }

            .section-right {
                justify-content: flex-end;
                overflow: hidden;
            }

            .tray {
                display: flex;
                align-items: center;
                min-width: 0;
                gap: 6px;
            }

            .workspaces {
                display: flex;
                align-items: center;
                min-width: 0;
                gap: 6px;
                overflow: hidden;
            }

            .pill {
                display: inline-flex;
                align-items: center;
                min-width: 0;
                gap: 6px;
                height: 24px;
                padding: 0 8px;
                border-radius: 6px;
                white-space: nowrap;
            }

            .pill {
                color: var(--text-primary);
            }

            .interactive {
                cursor: pointer;
            }

            .muted {
                color: var(--text-secondary);
            }

            .media-text,
            .workspace-text,
            .weather-text,
            .network-text,
            .audio-text,
            .battery-text {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .workspace-pill {
                max-width: 96px;
                border: 0;
                background: transparent;
                color: var(--text-primary);
                font: inherit;
                transition:
                    background 0.15s ease,
                    color 0.15s ease;
            }

            .workspace-pill-active {
                background: rgba(137, 180, 250, 0.18);
                color: var(--accent);
            }

            .interactive:hover {
                background: var(--hover);
            }

            .datetime {
                min-width: 0;
            }

            .status-icon {
                flex: 0 0 auto;
                font-size: 14px;
                line-height: 1;
            }

            .tray {
                position: relative;
                padding: 0 2px;
            }

            .tray-overflow {
                position: relative;
            }

            .tray-button {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 22px;
                height: 22px;
                border: 0;
                border-radius: 5px;
                background: transparent;
                cursor: pointer;
                transition: background 0.15s ease;
            }

            .tray-button:hover {
                background: var(--hover);
            }

            .tray-button img {
                width: 16px;
                height: 16px;
            }

            .tray-more {
                min-width: 30px;
                padding: 0 6px;
                color: var(--text-secondary);
                font-size: 12px;
            }

            .tray-popover {
                position: absolute;
                display: flex;
                align-items: center;
                gap: 6px;
                min-height: 30px;
                padding: 6px;
                border: 1px solid var(--border);
                border-radius: 8px;
                background: rgba(24, 24, 30, 0.94);
                backdrop-filter: blur(18px);
                -webkit-backdrop-filter: blur(18px);
                box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
                z-index: 10;
            }

            .top-bar-context-menu {
                position: absolute;
                display: flex;
                flex-direction: column;
                gap: 4px;
                min-width: 172px;
                padding: 6px;
                border: 1px solid var(--border);
                border-radius: 10px;
                background: rgba(24, 24, 30, 0.96);
                backdrop-filter: blur(18px);
                -webkit-backdrop-filter: blur(18px);
                box-shadow: 0 12px 28px rgba(0, 0, 0, 0.32);
                z-index: 20;
            }

            .top-bar-context-menu-item {
                display: flex;
                align-items: center;
                gap: 8px;
                width: 100%;
                min-height: 30px;
                padding: 0 10px;
                border: 0;
                border-radius: 7px;
                background: transparent;
                color: var(--text-primary);
                font: inherit;
                text-align: left;
                cursor: pointer;
                transition:
                    background 0.15s ease,
                    color 0.15s ease;
            }

            .top-bar-context-menu-item:hover {
                background: var(--hover);
                color: var(--accent);
            }

            .warning {
                color: var(--warning);
            }

            .hidden {
                display: none !important;
            }
        </style>
    </head>
    <body>
        <div class="bar">
            <div class="section section-left">
                <div id="workspaces" class="workspaces hidden"></div>
            </div>
            <div class="section section-center">
                <div id="datetime" class="pill datetime"></div>
            </div>
            <div class="section section-right">
                <div id="media" class="pill hidden"></div>
                <div id="systray" class="tray hidden"></div>
                <div id="weather" class="pill hidden"></div>
                <div id="network" class="pill interactive hidden"></div>
                <div id="audio" class="pill interactive hidden"></div>
                <div id="battery" class="pill interactive hidden"></div>
            </div>
        </div>
        <script type="module">
            import * as zebar from "https://esm.sh/zebar@3.1.1?bundle";

            const MEDIA_TEXT_LIMIT = 28;
            const VOLUME_STEP = 5;
            const CELLULAR_SIGNAL_REFRESH_INTERVAL = 5000;
            const KOMOREBI_STATE_REFRESH_INTERVAL = 1000;
            const WEATHER_REFRESH_INTERVAL = 15 * 60 * 1000;
            const QUICK_SETTINGS_POPUP_WIDTH = 420;
            const QUICK_SETTINGS_POPUP_HEIGHT = 580;
            const WINTENDER_SETTINGS_WIDTH = 420;
            const WINTENDER_SETTINGS_HEIGHT = 420;
            const TOP_BAR_HEIGHT = 32;
            const TOP_BAR_CONTEXT_MENU_WIDTH = 172;
            const TOP_BAR_CONTEXT_MENU_MARGIN = 8;
            const ZEBAR_SETTINGS_WINDOW_TIMEOUT_MS = 1500;
            const ZEBAR_TRAY_TOOLTIP_PREFIX = "Zebar v";
            const TASK_MANAGER_PROGRAM = "taskmgr.exe";
            const ZEBAR_SETTINGS_WINDOW_LABEL = "settings";
            const ZEBAR_SETTINGS_WINDOW_TITLE = "Settings - Zebar";
            const ZEBAR_SETTINGS_WINDOW_WIDTH = 900;
            const ZEBAR_SETTINGS_WINDOW_HEIGHT = 600;
            const WINTENDER_SETTINGS_STORAGE_KEY = "wintender:settings";
            const WINTENDER_SETTINGS_CHANNEL_NAME = "wintender-settings";
            const KOMOREBIC_PROGRAM_CANDIDATES = [
                "C:\\Program Files\\komorebi\\bin\\komorebic-no-console.exe",
                "C:\\Program Files\\komorebi\\bin\\komorebic.exe",
                "komorebic.exe",
            ];
            const DEFAULT_USER_SETTINGS = Object.freeze({
                showKomorebiWorkspaces: true,
                showSystray: true,
                showWeather: false,
                showNetwork: true,
                showAudio: true,
                showBattery: true,
                clockFormat: "",
                pinnedTrayTooltips: [],
            });
            const CLOCK_TOKEN_PATTERN =
                /yyyy|dddd|ddd|yy|MM|M|dd|d|HH|H|hh|h|mm|m|ss|s|tt/g;

            const elements = {
                workspaces: document.getElementById("workspaces"),
                datetime: document.getElementById("datetime"),
                media: document.getElementById("media"),
                systray: document.getElementById("systray"),
                weather: document.getElementById("weather"),
                network: document.getElementById("network"),
                audio: document.getElementById("audio"),
                battery: document.getElementById("battery"),
                topBarContextMenu: null,
            };

            const providers = zebar.createProviderGroup({
                komorebi: { type: "komorebi" },
                date: { type: "date", refreshInterval: 1000 },
                battery: { type: "battery", refreshInterval: 10000 },
                network: { type: "network", refreshInterval: 5000 },
                audio: { type: "audio" },
                systray: { type: "systray" },
                media: { type: "media" },
            });
            const state = {
                latestKomorebiOutput: null,
                latestDateOutput: null,
                latestMediaOutput: null,
                komorebiLastRefreshAt: 0,
                komorebiRefreshRequest: null,
                komorebiRefreshSequence: 0,
                komorebiAppliedRefreshSequence: 0,
                latestSystrayOutput: null,
                latestIpOutput: null,
                latestWeatherOutput: null,
                latestNetworkOutput: null,
                latestAudioOutput: null,
                latestBatteryOutput: null,
                cellularSignalStrength: null,
                cellularSignalUpdatedAt: 0,
                cellularSignalRequest: null,
                weatherProviderGroup: null,
                topBarContextMenuOpen: false,
                userSettings: { ...DEFAULT_USER_SETTINGS },
                userSettingsStorageRaw: null,
                userSettingsChannel: null,
            };

            function clamp(value, min, max) {
                return Math.min(Math.max(value, min), max);
            }

            function truncate(text, maxLength) {
                if (!text) {
                    return "";
                }

                return text.length > maxLength
                    ? `${text.slice(0, maxLength - 1)}…`
                    : text;
            }

            function toggleHidden(element, hidden) {
                element.classList.toggle("hidden", hidden);
            }

            function iconSpan(icon) {
                const span = document.createElement("span");
                span.className = "status-icon";
                span.textContent = icon;
                return span;
            }

            function textSpan(className, text) {
                const span = document.createElement("span");
                span.className = className;
                span.textContent = text;
                return span;
            }

            function clearElement(element) {
                while (element.firstChild) {
                    element.removeChild(element.firstChild);
                }
            }

            function normalizeText(text) {
                return typeof text === "string" ? text.trim() : "";
            }

            function getDefaultUserSettings() {
                return { ...DEFAULT_USER_SETTINGS };
            }

            function mergeUserSettings(rawSettings) {
                const settings = getDefaultUserSettings();

                if (!rawSettings || typeof rawSettings !== "object") {
                    return settings;
                }

                if (typeof rawSettings.showKomorebiWorkspaces === "boolean") {
                    settings.showKomorebiWorkspaces =
                        rawSettings.showKomorebiWorkspaces;
                }

                if (typeof rawSettings.showSystray === "boolean") {
                    settings.showSystray = rawSettings.showSystray;
                }

                if (typeof rawSettings.showWeather === "boolean") {
                    settings.showWeather = rawSettings.showWeather;
                }

                if (typeof rawSettings.showNetwork === "boolean") {
                    settings.showNetwork = rawSettings.showNetwork;
                }

                if (typeof rawSettings.showAudio === "boolean") {
                    settings.showAudio = rawSettings.showAudio;
                }

                if (typeof rawSettings.showBattery === "boolean") {
                    settings.showBattery = rawSettings.showBattery;
                }

                if (typeof rawSettings.clockFormat === "string") {
                    settings.clockFormat = normalizeText(rawSettings.clockFormat);
                }

                if (Array.isArray(rawSettings.pinnedTrayTooltips)) {
                    settings.pinnedTrayTooltips = rawSettings.pinnedTrayTooltips
                        .map((value) => normalizeText(value))
                        .filter(Boolean);
                }

                return settings;
            }

            function safeJsonParse(text) {
                if (typeof text !== "string" || !text.trim()) {
                    return null;
                }

                try {
                    return JSON.parse(text);
                } catch (error) {
                    console.error("Failed to parse wintender settings", error);
                    return null;
                }
            }

            function readStoredUserSettings(
                storage = globalThis.localStorage,
            ) {
                if (typeof storage?.getItem !== "function") {
                    return {
                        raw: null,
                        settings: getDefaultUserSettings(),
                    };
                }

                const raw = storage.getItem(WINTENDER_SETTINGS_STORAGE_KEY);

                if (typeof raw !== "string" || !raw.trim()) {
                    return {
                        raw: null,
                        settings: getDefaultUserSettings(),
                    };
                }

                return {
                    raw,
                    settings: mergeUserSettings(safeJsonParse(raw)),
                };
            }

            function padNumber(value, length = 2) {
                return String(value).padStart(length, "0");
            }

            function getDayPeriodText(date, locale = "ko-KR") {
                try {
                    return (
                        new Intl.DateTimeFormat(locale, {
                            hour: "numeric",
                            hour12: true,
                        })
                            .formatToParts(date)
                            .find((part) => part.type === "dayPeriod")?.value ??
                        (date.getHours() < 12 ? "AM" : "PM")
                    );
                } catch (error) {
                    return date.getHours() < 12 ? "AM" : "PM";
                }
            }

            function formatClockText(
                now,
                format,
                locale = "ko-KR",
            ) {
                const date = now instanceof Date ? now : new Date(now);

                if (
                    !(date instanceof Date) ||
                    Number.isNaN(date.getTime()) ||
                    !normalizeText(format)
                ) {
                    return "--";
                }

                const hours24 = date.getHours();
                const hours12 = hours24 % 12 || 12;
                const tokenValues = {
                    yyyy: padNumber(date.getFullYear(), 4),
                    yy: padNumber(date.getFullYear() % 100, 2),
                    MM: padNumber(date.getMonth() + 1, 2),
                    M: String(date.getMonth() + 1),
                    dd: padNumber(date.getDate(), 2),
                    d: String(date.getDate()),
                    ddd: date.toLocaleDateString(locale, {
                        weekday: "short",
                    }),
                    dddd: date.toLocaleDateString(locale, {
                        weekday: "long",
                    }),
                    HH: padNumber(hours24, 2),
                    H: String(hours24),
                    hh: padNumber(hours12, 2),
                    h: String(hours12),
                    mm: padNumber(date.getMinutes(), 2),
                    m: String(date.getMinutes()),
                    ss: padNumber(date.getSeconds(), 2),
                    s: String(date.getSeconds()),
                    tt: getDayPeriodText(date, locale),
                };

                return format.replace(
                    CLOCK_TOKEN_PATTERN,
                    (token) => tokenValues[token] ?? token,
                );
            }

            function formatDate(now) {
                if (!now) {
                    return "--";
                }

                const customFormat = normalizeText(state.userSettings.clockFormat);

                if (customFormat) {
                    return formatClockText(now, customFormat);
                }

                const date = new Date(now);

                const datePart = date.toLocaleDateString("ko-KR", {
                    month: "long",
                    day: "numeric",
                    weekday: "short",
                });
                const timePart = date.toLocaleTimeString("ko-KR", {
                    hour: "2-digit",
                    minute: "2-digit",
                    hour12: true,
                });

                return `${datePart} ${timePart}`;
            }

            function renderAllCurrentState() {
                renderKomorebi(state.latestKomorebiOutput);
                renderDate(state.latestDateOutput);
                renderMedia(state.latestMediaOutput);
                renderSystray(state.latestSystrayOutput);
                renderWeather(state.latestWeatherOutput);
                renderNetwork(state.latestNetworkOutput);
                renderAudio(state.latestAudioOutput);
                renderBattery(state.latestBatteryOutput);
            }

            function applyUserSettings(
                rawSettings,
                {
                    raw = null,
                    rerender = true,
                } = {},
            ) {
                const previousSettings = state.userSettings;
                state.userSettings = mergeUserSettings(rawSettings);
                state.userSettingsStorageRaw = raw;
                syncWeatherProviderForSettings({
                    previousSettings,
                    nextSettings: state.userSettings,
                });

                if (rerender) {
                    renderAllCurrentState();
                }

                return state.userSettings;
            }

            function setUserSettings(nextSettings, options = {}) {
                return applyUserSettings(nextSettings, options);
            }

            function syncUserSettingsFromStorage({
                storage = globalThis.localStorage,
                rerender = true,
            } = {}) {
                const { raw, settings } = readStoredUserSettings(storage);

                if (raw === state.userSettingsStorageRaw) {
                    return state.userSettings;
                }

                return applyUserSettings(settings, { raw, rerender });
            }

            function initializeUserSettings() {
                const { raw, settings } = readStoredUserSettings();
                applyUserSettings(settings, {
                    raw,
                    rerender: false,
                });
            }

            function setupUserSettingsSync() {
                if (typeof BroadcastChannel === "function") {
                    try {
                        const channel = new BroadcastChannel(
                            WINTENDER_SETTINGS_CHANNEL_NAME,
                        );

                        channel.addEventListener("message", () => {
                            syncUserSettingsFromStorage();
                        });
                        state.userSettingsChannel = channel;
                    } catch (error) {
                        console.error(
                            "Failed to initialize wintender settings channel",
                            error,
                        );
                    }
                }

                if (typeof window?.addEventListener === "function") {
                    window.addEventListener("storage", (event) => {
                        if (
                            event?.key &&
                            event.key !== WINTENDER_SETTINGS_STORAGE_KEY
                        ) {
                            return;
                        }

                        syncUserSettingsFromStorage();
                    });
                }
            }

            function getSignalStrengthValue(...candidates) {
                for (const candidate of candidates) {
                    const value =
                        typeof candidate === "string"
                            ? Number(candidate)
                            : candidate;

                    if (Number.isFinite(value)) {
                        return clamp(value, 0, 100);
                    }
                }

                return null;
            }

            function getSignalLevel(signalStrength) {
                if (!Number.isFinite(signalStrength)) {
                    return null;
                }

                if (signalStrength < 25) {
                    return 0;
                }

                if (signalStrength < 50) {
                    return 1;
                }

                if (signalStrength < 75) {
                    return 2;
                }

                return 3;
            }

            function getWifiSignalIcon(signalStrength) {
                const level = getSignalLevel(signalStrength);
                const icons = ["󰤟", "󰤢", "󰤥", "󰤨"];

                return level === null ? "󰤨" : icons[level];
            }

            function getCellularSignalIcon(signalStrength) {
                const level = getSignalLevel(signalStrength);
                const icons = ["󰢿", "󰢼", "󰢽", "󰢾"];

                return level === null ? "󰢿" : icons[level];
            }

            function isCellularInterfaceType(interfaceType) {
                return (
                    interfaceType === "mobile_broadband" ||
                    interfaceType === "generic_modem" ||
                    interfaceType === "ppp"
                );
            }

            function parseNetshCellularSignalStrength(output) {
                if (typeof output !== "string") {
                    return null;
                }

                const match = output.match(/^\s*Signal\s*:\s*(\d+)%\s*$/im);
                return match ? clamp(Number(match[1]), 0, 100) : null;
            }

            function getMediaState(mediaOutput) {
                const session = mediaOutput?.currentSession ?? null;

                if (!session || (!session.artist && !session.title)) {
                    return null;
                }

                const artist = session.artist?.trim();
                const title = session.title?.trim();
                const text = truncate(
                    [artist, title].filter(Boolean).join(" - ") ||
                        title ||
                        artist ||
                        "",
                    MEDIA_TEXT_LIMIT,
                );

                return {
                    icon: session.isPlaying ? "󰏤" : "󰐊",
                    text,
                };
            }

            function getWeatherStatusIcon(status) {
                switch (status) {
                    case "clear_day":
                        return "☀";
                    case "clear_night":
                        return "☾";
                    case "cloudy_day":
                    case "cloudy_night":
                        return "☁";
                    case "light_rain_day":
                    case "light_rain_night":
                    case "heavy_rain_day":
                    case "heavy_rain_night":
                        return "☂";
                    case "snow_day":
                    case "snow_night":
                        return "❄";
                    case "thunder_day":
                    case "thunder_night":
                        return "⚡";
                    default:
                        return "☁";
                }
            }

            function getWeatherState(
                weatherOutput,
                ipOutput = state.latestIpOutput,
            ) {
                const celsiusTemp = weatherOutput?.celsiusTemp;
                const status = normalizeText(weatherOutput?.status);
                const approxCity = normalizeText(ipOutput?.approxCity);
                const approxCountry = normalizeText(ipOutput?.approxCountry);

                if (!Number.isFinite(celsiusTemp) || !status) {
                    return null;
                }

                const locationLabel = approxCity || approxCountry;
                const temperatureLabel = `${Math.round(celsiusTemp)}°C`;

                return {
                    icon: getWeatherStatusIcon(status),
                    text: locationLabel
                        ? `${locationLabel} ${temperatureLabel}`
                        : temperatureLabel,
                };
            }

            function getCoordinateDistance(pointA, pointB) {
                return Math.hypot(pointA.x - pointB.x, pointA.y - pointB.y);
            }

            function getKomorebicProgramCandidates() {
                return [...KOMOREBIC_PROGRAM_CANDIDATES];
            }

            function isProgramNotFoundShellError(error) {
                return normalizeText(error?.message)
                    .toLowerCase()
                    .includes("program not found");
            }

            function getCurrentWidgetScreenPosition(options = {}) {
                const fallbackWindow =
                    typeof window === "object" && window ? window : null;
                const x = Number.isFinite(options.x)
                    ? options.x
                    : fallbackWindow?.screenX;
                const y = Number.isFinite(options.y)
                    ? options.y
                    : fallbackWindow?.screenY;

                return {
                    x: Number.isFinite(x) ? x : 0,
                    y: Number.isFinite(y) ? y : 0,
                };
            }

            function normalizeKomorebiWindow(rawWindow) {
                if (!rawWindow || typeof rawWindow !== "object") {
                    return null;
                }

                return {
                    class: rawWindow.class ?? null,
                    exe: rawWindow.exe ?? null,
                    hwnd: rawWindow.hwnd ?? 0,
                    title: rawWindow.title ?? null,
                };
            }

            function normalizeKomorebiWindows(rawCollection) {
                const windows = rawCollection?.elements ?? rawCollection ?? [];

                if (!Array.isArray(windows)) {
                    return [];
                }

                return windows
                    .map((window) => normalizeKomorebiWindow(window))
                    .filter(Boolean);
            }

            function normalizeKomorebiContainer(rawContainer) {
                if (!rawContainer || typeof rawContainer !== "object") {
                    return null;
                }

                return {
                    id: rawContainer.id ?? "",
                    windows: normalizeKomorebiWindows(rawContainer.windows),
                };
            }

            function normalizeKomorebiLayout(rawLayout) {
                const defaultLayout = normalizeText(
                    rawLayout?.Default ?? rawLayout?.default,
                );
                const layouts = {
                    BSP: "bsp",
                    VerticalStack: "vertical_stack",
                    HorizontalStack: "horizontal_stack",
                    UltrawideVerticalStack: "ultrawide_vertical_stack",
                    Rows: "rows",
                    Grid: "grid",
                    RightMainVerticalStack: "right_main_vertical_stack",
                };

                return layouts[defaultLayout] ?? "custom";
            }

            function normalizeKomorebiLayoutFlip(rawFlip) {
                const normalized = normalizeText(rawFlip);
                const flips = {
                    Horizontal: "horizontal",
                    Vertical: "vertical",
                    HorizontalAndVertical: "horizontal_and_vertical",
                };

                return flips[normalized] ?? null;
            }

            function normalizeKomorebiWorkspace(rawWorkspace) {
                if (!rawWorkspace || typeof rawWorkspace !== "object") {
                    return null;
                }

                const containers = rawWorkspace.containers?.elements ?? [];

                return {
                    containerPadding: rawWorkspace.container_padding ?? null,
                    floatingWindows: normalizeKomorebiWindows(
                        rawWorkspace.floating_windows,
                    ),
                    focusedContainerIndex: Number.isInteger(
                        rawWorkspace.containers?.focused,
                    )
                        ? rawWorkspace.containers.focused
                        : 0,
                    latestLayout: Array.isArray(rawWorkspace.latest_layout)
                        ? rawWorkspace.latest_layout
                        : [],
                    layout: normalizeKomorebiLayout(rawWorkspace.layout),
                    layoutFlip: normalizeKomorebiLayoutFlip(
                        rawWorkspace.layout_flip,
                    ),
                    maximizedWindow: normalizeKomorebiWindow(
                        rawWorkspace.maximized_window,
                    ),
                    monocleContainer: normalizeKomorebiContainer(
                        rawWorkspace.monocle_container,
                    ),
                    name: rawWorkspace.name ?? null,
                    tilingContainers: Array.isArray(containers)
                        ? containers
                              .map((container) =>
                                  normalizeKomorebiContainer(container),
                              )
                              .filter(Boolean)
                        : [],
                    workspacePadding: rawWorkspace.workspace_padding ?? null,
                };
            }

            function normalizeKomorebiMonitor(rawMonitor) {
                if (!rawMonitor || typeof rawMonitor !== "object") {
                    return null;
                }

                const workspaces = rawMonitor.workspaces?.elements ?? [];

                return {
                    id: rawMonitor.id ?? -1,
                    deviceId:
                        rawMonitor.device_id ?? rawMonitor.deviceId ?? "",
                    focusedWorkspaceIndex: Number.isInteger(
                        rawMonitor.workspaces?.focused,
                    )
                        ? rawMonitor.workspaces.focused
                        : 0,
                    name: rawMonitor.name ?? "",
                    size: rawMonitor.size ?? null,
                    workAreaOffset:
                        rawMonitor.work_area_offset ??
                        rawMonitor.workAreaOffset ??
                        null,
                    workAreaSize:
                        rawMonitor.work_area_size ??
                        rawMonitor.workAreaSize ??
                        null,
                    workspaces: Array.isArray(workspaces)
                        ? workspaces
                              .map((workspace) =>
                                  normalizeKomorebiWorkspace(workspace),
                              )
                              .filter(Boolean)
                        : [],
                };
            }

            function parseKomorebiStateOutput(stdout, options = {}) {
                if (typeof stdout !== "string" || !stdout.trim()) {
                    return null;
                }

                let parsed;

                try {
                    parsed = JSON.parse(stdout);
                } catch (error) {
                    console.error("Failed to parse komorebi state output", error);
                    return null;
                }

                const rawMonitors = parsed?.monitors?.elements ?? [];
                const allMonitors = Array.isArray(rawMonitors)
                    ? rawMonitors
                          .map((monitor) => normalizeKomorebiMonitor(monitor))
                          .filter(Boolean)
                    : [];

                if (!allMonitors.length) {
                    return null;
                }

                const focusedMonitorIndex = Number.isInteger(
                    parsed?.monitors?.focused,
                )
                    ? parsed.monitors.focused
                    : 0;
                const currentPosition =
                    getCurrentWidgetScreenPosition(options);
                const currentMonitor = allMonitors.reduce((closest, candidate) =>
                    getCoordinateDistance(currentPosition, {
                        x: candidate.workAreaSize?.left ?? 0,
                        y: candidate.workAreaSize?.top ?? 0,
                    }) <
                    getCoordinateDistance(currentPosition, {
                        x: closest.workAreaSize?.left ?? 0,
                        y: closest.workAreaSize?.top ?? 0,
                    })
                        ? candidate
                        : closest,
                );
                const focusedMonitor =
                    allMonitors[focusedMonitorIndex] ?? allMonitors[0];

                return {
                    displayedWorkspace:
                        currentMonitor?.workspaces?.[
                            currentMonitor.focusedWorkspaceIndex
                        ] ?? null,
                    focusedWorkspace:
                        focusedMonitor?.workspaces?.[
                            focusedMonitor.focusedWorkspaceIndex
                        ] ?? null,
                    currentWorkspaces: currentMonitor?.workspaces ?? [],
                    allWorkspaces: allMonitors.flatMap(
                        (monitor) => monitor.workspaces,
                    ),
                    allMonitors,
                    focusedMonitor,
                    currentMonitor,
                    focusedMonitorIndex,
                };
            }

            async function runKomorebicCommand(
                args,
                executor = (program, commandArgs) =>
                    zebar.shellExec(program, commandArgs),
            ) {
                let lastError = null;

                for (const program of getKomorebicProgramCandidates()) {
                    try {
                        return await executor(program, args);
                    } catch (error) {
                        lastError = error;

                        if (!isProgramNotFoundShellError(error)) {
                            throw error;
                        }
                    }
                }

                throw lastError;
            }

            function getKomorebiWorkspaceLabel(workspace, index) {
                const name = normalizeText(workspace?.name);
                return name || String(index + 1);
            }

            function getCurrentKomorebiMonitorIndex(komorebiOutput) {
                const currentMonitor = komorebiOutput?.currentMonitor ?? null;
                const allMonitors = komorebiOutput?.allMonitors ?? [];

                if (!currentMonitor || !allMonitors.length) {
                    return -1;
                }

                return allMonitors.findIndex((monitor) => {
                    if (!monitor) {
                        return false;
                    }

                    if (
                        normalizeText(currentMonitor.deviceId) &&
                        monitor.deviceId === currentMonitor.deviceId
                    ) {
                        return true;
                    }

                    if (
                        Number.isFinite(currentMonitor.id) &&
                        monitor.id === currentMonitor.id
                    ) {
                        return true;
                    }

                    if (
                        !normalizeText(currentMonitor.name) ||
                        !monitor.workAreaSize ||
                        !currentMonitor.workAreaSize
                    ) {
                        return false;
                    }

                    return (
                        normalizeText(monitor.name) ===
                            normalizeText(currentMonitor.name) &&
                        monitor.workAreaSize?.left ===
                            currentMonitor.workAreaSize?.left &&
                        monitor.workAreaSize?.top ===
                            currentMonitor.workAreaSize?.top
                    );
                });
            }

            function getKomorebiWorkspaceItems(komorebiOutput) {
                const workspaces = komorebiOutput?.currentWorkspaces ?? [];
                const activeIndex = Number.isInteger(
                    komorebiOutput?.currentMonitor?.focusedWorkspaceIndex,
                )
                    ? komorebiOutput.currentMonitor.focusedWorkspaceIndex
                    : -1;

                return workspaces.map((workspace, index) => ({
                    index,
                    label: getKomorebiWorkspaceLabel(workspace, index),
                    isActive: index === activeIndex,
                }));
            }

            function getKomorebiFocusWorkspaceCommand(
                komorebiOutput,
                workspaceIndex,
            ) {
                if (!Number.isInteger(workspaceIndex) || workspaceIndex < 0) {
                    return null;
                }

                const monitorIndex =
                    getCurrentKomorebiMonitorIndex(komorebiOutput);

                return monitorIndex < 0
                    ? null
                    : `focus-monitor-workspace ${monitorIndex} ${workspaceIndex}`;
            }

            function shouldRefreshKomorebiState({
                now = Date.now(),
                lastRefreshAt = 0,
                refreshRequest = null,
                refreshInterval = KOMOREBI_STATE_REFRESH_INTERVAL,
            } = {}) {
                if (refreshRequest) {
                    return false;
                }

                return now - lastRefreshAt >= refreshInterval;
            }

            function syncKomorebiState({
                currentState = state,
                refreshState = refreshKomorebiState,
                now = Date.now(),
                refreshInterval = KOMOREBI_STATE_REFRESH_INTERVAL,
            } = {}) {
                if (
                    !shouldRefreshKomorebiState({
                        now,
                        lastRefreshAt: currentState.komorebiLastRefreshAt,
                        refreshRequest: currentState.komorebiRefreshRequest,
                        refreshInterval,
                    })
                ) {
                    return currentState.komorebiRefreshRequest;
                }

                return refreshState();
            }

            function getNetworkState(networkOutput, options = {}) {
                const defaultInterface =
                    networkOutput?.defaultInterface ?? null;
                const gateway = networkOutput?.defaultGateway ?? null;

                if (!defaultInterface) {
                    return {
                        icon: "󰤭",
                        text: "No Network",
                    };
                }

                if (defaultInterface.type === "wifi") {
                    const signalStrength = getSignalStrengthValue(
                        gateway?.signalStrength,
                    );

                    return {
                        icon: getWifiSignalIcon(signalStrength),
                        text:
                            gateway?.ssid ||
                            defaultInterface.friendlyName ||
                            "Wi-Fi",
                    };
                }

                if (defaultInterface.type === "ethernet") {
                    return {
                        icon: "󰈀",
                        text: "Ethernet",
                    };
                }

                if (isCellularInterfaceType(defaultInterface.type)) {
                    const text =
                        normalizeText(defaultInterface.friendlyName) ||
                        normalizeText(defaultInterface.description) ||
                        normalizeText(defaultInterface.name) ||
                        "Cellular";
                    const signalStrength = getSignalStrengthValue(
                        defaultInterface.signalStrength,
                        defaultInterface.signalPercent,
                        defaultInterface.strength,
                        defaultInterface.signal,
                        defaultInterface.quality,
                        options.cellularSignalStrength,
                    );

                    return {
                        icon: getCellularSignalIcon(signalStrength),
                        text,
                    };
                }

                return {
                    icon: "󰤭",
                    text:
                        defaultInterface.friendlyName ||
                        defaultInterface.name ||
                        "No Network",
                };
            }

            function shouldRefreshCellularSignal(networkOutput) {
                const defaultInterface =
                    networkOutput?.defaultInterface ?? null;

                if (!isCellularInterfaceType(defaultInterface?.type)) {
                    return false;
                }

                const providerSignal = getSignalStrengthValue(
                    defaultInterface.signalStrength,
                    defaultInterface.signalPercent,
                    defaultInterface.strength,
                    defaultInterface.signal,
                    defaultInterface.quality,
                );

                if (providerSignal !== null || state.cellularSignalRequest) {
                    return false;
                }

                const elapsed = Date.now() - state.cellularSignalUpdatedAt;
                return (
                    state.cellularSignalStrength === null ||
                    elapsed >= CELLULAR_SIGNAL_REFRESH_INTERVAL
                );
            }

            async function refreshCellularSignalStrength(networkOutput) {
                if (!shouldRefreshCellularSignal(networkOutput)) {
                    return state.cellularSignalStrength;
                }

                state.cellularSignalRequest = (async () => {
                    try {
                        const result = await zebar.shellExec(
                            "netsh.exe",
                            "mbn show interfaces",
                        );
                        const signalStrength =
                            parseNetshCellularSignalStrength(result.stdout);

                        state.cellularSignalStrength = signalStrength;
                        state.cellularSignalUpdatedAt = Date.now();
                    } catch (error) {
                        state.cellularSignalUpdatedAt = Date.now();
                        console.error(
                            "Failed to refresh cellular signal strength",
                            error,
                        );
                    } finally {
                        state.cellularSignalRequest = null;
                    }

                    return state.cellularSignalStrength;
                })();

                const signalStrength = await state.cellularSignalRequest;

                if (state.latestNetworkOutput) {
                    renderNetwork(state.latestNetworkOutput);
                }

                return signalStrength;
            }

            function getNetworkFlyoutTargets() {
                return ["ms-availablenetworks:", "ms-settings:network"];
            }

            async function openNetworkFlyout() {
                for (const target of getNetworkFlyoutTargets()) {
                    try {

            function initializeWeatherProvider() {
                if (state.weatherProviderGroup) {
                    return state.weatherProviderGroup;
                }

                const providerGroup = zebar.createProviderGroup({
                    ip: {
                        type: "ip",
                        refreshInterval: WEATHER_REFRESH_INTERVAL,
                    },
                    weather: {
                        type: "weather",
                        refreshInterval: WEATHER_REFRESH_INTERVAL,
                    },
                });

                providerGroup.onOutput((output) => {
                    state.latestIpOutput = output?.ip ?? state.latestIpOutput;
                    state.latestWeatherOutput = output?.weather ?? null;
                    renderWeather(state.latestWeatherOutput);
                });
                providerGroup.onError((errorMap) => {
                    if (errorMap?.ip) {
                        state.latestIpOutput = null;
                    }
                    state.latestWeatherOutput = null;
                    renderWeather(null);
                    console.error("Weather provider error", errorMap);
                });

                state.weatherProviderGroup = providerGroup;
                return providerGroup;
            }

            async function ensureWeatherProvider() {
                if (!state.userSettings.showWeather) {
                    return null;
                }

                return initializeWeatherProvider();
            }

            function syncWeatherProviderForSettings({ nextSettings }) {
                const isEnabled = nextSettings?.showWeather === true;

                if (!isEnabled) {
                    renderWeather(null);
                    return;
                }

                void ensureWeatherProvider();
            }

            function getAudioState(audioOutput) {
                const device = audioOutput?.defaultPlaybackDevice ?? null;

                if (!device) {
                    return null;
                }

                const volume = Math.round(device.volume ?? 0);
                const isMuted = Boolean(device.isMuted) || volume === 0;
                let icon = "󰕾";

                if (isMuted) {
                    icon = "󰖁";
                } else if (volume <= 33) {
                    icon = "󰕿";
                } else if (volume <= 66) {
                    icon = "󰖀";
                }

                return {
                    icon,
                    text: `${volume}%`,
                    volume,
                    isMuted,
                    deviceId: device.deviceId,
                };
            }

            function getBatteryState(batteryOutput) {
                if (
                    !batteryOutput ||
                    typeof batteryOutput.chargePercent !== "number"
                ) {
                    return null;
                }

                const percent = Math.round(batteryOutput.chargePercent);
                let icon = "󰁹";

                if (batteryOutput.isCharging) {
                    icon = "󰂄";
                } else if (percent >= 90) {
                    icon = "󰁹";
                } else if (percent >= 60) {
                    icon = "󰂁";
                } else if (percent >= 30) {
                    icon = "󰁾";
                } else if (percent >= 10) {
                    icon = "󰁻";
                } else {
                    icon = "󰂎";
                }

                return {
                    icon,
                    text: `${percent}%`,
                    isWarning: !batteryOutput.isCharging && percent < 10,
                };
            }

            function isPinnedTrayIcon(icon) {
                const tooltip = normalizeText(icon?.tooltip);
                return tooltip
                    ? state.userSettings.pinnedTrayTooltips.includes(tooltip)
                    : false;
            }

            function getTrayGroups(systrayOutput) {
                const icons = systrayOutput?.icons ?? [];
                const pinnedIcons = [];
                const overflowIcons = [];

                icons.forEach((icon) => {
                    if (isPinnedTrayIcon(icon)) {
                        pinnedIcons.push(icon);
                    } else {
                        overflowIcons.push(icon);
                    }
                });

                return { pinnedIcons, overflowIcons };
            }

            function closeTrayOverflow() {
                // Overflow tray icons are rendered in a separate popup widget.
            }

            async function openTrayPopup(event, overflowCount) {
                const button = event.currentTarget;

                if (!(button instanceof HTMLElement) || overflowCount <= 0) {
                    return;
                }

                const current = zebar.currentWidget();
                const anchorRect = button.getBoundingClientRect();
                const maxColumns = 8;
                const columns = Math.min(
                    Math.max(overflowCount, 1),
                    maxColumns,
                );
                const rows = Math.max(1, Math.ceil(overflowCount / maxColumns));
                const popupWidth = columns * 28 + 20;
                const popupHeight = rows * 28 + 16;
                const offsetX = Math.max(
                    8,
                    Math.round(anchorRect.right - popupWidth),
                );
                const offsetY = Math.max(36, Math.round(anchorRect.bottom + 8));

                try {
                    await zebar.startWidget(
                        "tray-popup",
                        {
                            anchor: "top_left",
                            offsetX: `${offsetX}px`,
                            offsetY: `${offsetY}px`,
                            width: `${popupWidth}px`,
                            height: `${popupHeight}px`,
                            monitorSelection: { type: "primary" },
                            dockToEdge: {
                                enabled: false,
                                edge: null,
                                windowMargin: "0px",
                            },
                        },
                        { packId: current.packId },
                    );
                } catch (error) {
                    console.error(
                        "Dynamic tray popup launch failed, falling back to preset",
                        error,
                    );
                    await zebar.startWidgetPreset("tray-popup", "default", {
                        packId: current.packId,
                    });
                }
            }

            function getQuickSettingsPlacement(anchorRect) {
                const popupWidth = QUICK_SETTINGS_POPUP_WIDTH;
                const popupHeight = QUICK_SETTINGS_POPUP_HEIGHT;
                const offsetX = Math.max(
                    8,
                    Math.round(anchorRect.right - popupWidth),
                );
                const offsetY = Math.max(36, Math.round(anchorRect.bottom + 8));

                return {
                    anchor: "top_left",
                    offsetX: `${offsetX}px`,
                    offsetY: `${offsetY}px`,
                    width: `${popupWidth}px`,
                    height: `${popupHeight}px`,
                    monitorSelection: { type: "primary" },
                    dockToEdge: {
                        enabled: false,
                        edge: null,
                        windowMargin: "0px",
                    },
                };
            }

            async function openQuickSettings(event) {
                const button = event?.currentTarget;

                if (!(button instanceof HTMLElement)) {
                    return;
                }

                const current = zebar.currentWidget();
                const placement = getQuickSettingsPlacement(
                    button.getBoundingClientRect(),
                );

                try {
                    await zebar.startWidget(
                        "quick-settings",
                        placement,
                        { packId: current.packId },
                    );
                } catch (error) {
                    console.error(
                        "Dynamic quick settings launch failed, falling back to preset",
                        error,
                    );
                    await zebar.startWidgetPreset("quick-settings", "default", {
                        packId: current.packId,
                    });
                }
            }

            function createTopBarContextMenuItem({
                action,
                icon,
                label,
            }) {
                const button = document.createElement("button");

                button.className = "top-bar-context-menu-item";
                button.type = "button";
                button.dataset.action = action;
                button.appendChild(iconSpan(icon));
                button.appendChild(textSpan("top-bar-context-menu-text", label));
                button.addEventListener("click", () => {
                    void runTopBarContextMenuAction(action);
                });

                return button;
            }

            function createTopBarContextMenu() {
                if (elements.topBarContextMenu) {
                    return elements.topBarContextMenu;
                }

                const menu = document.createElement("div");

                menu.className = "top-bar-context-menu hidden";
                menu.setAttribute("role", "menu");
                menu.appendChild(
                    createTopBarContextMenuItem({
                        action: "task-manager",
                        icon: "󰙨",
                        label: "Task Manager",
                    }),
                );
                menu.appendChild(
                    createTopBarContextMenuItem({
                        action: "wintender-settings",
                        icon: "󰒓",
                        label: "Wintender Settings",
                    }),
                );
                menu.appendChild(
                    createTopBarContextMenuItem({
                        action: "zebar-settings",
                        icon: "󰒓",
                        label: "Zebar Settings",
                    }),
                );

                document.body.appendChild(menu);
                elements.topBarContextMenu = menu;
                return menu;
            }

            function shouldHandleTopBarContextMenu(target) {
                if (!state.topBarContextMenuOpen && !elements.topBarContextMenu) {
                    createTopBarContextMenu();
                }

                if (!(target instanceof HTMLElement)) {
                    return true;
                }

                if (elements.topBarContextMenu?.contains(target)) {
                    return false;
                }

                if (elements.systray?.contains(target)) {
                    return false;
                }

                return document.body.contains(target);
            }

            function getTopBarContextMenuPosition(clientX = 0, clientY = 0) {
                const viewportWidth =
                    Number.isFinite(window?.innerWidth) &&
                    window.innerWidth > 0
                        ? window.innerWidth
                        : TOP_BAR_CONTEXT_MENU_WIDTH +
                          TOP_BAR_CONTEXT_MENU_MARGIN * 2;
                const maxLeft = Math.max(
                    TOP_BAR_CONTEXT_MENU_MARGIN,
                    viewportWidth -
                        TOP_BAR_CONTEXT_MENU_WIDTH -
                        TOP_BAR_CONTEXT_MENU_MARGIN,
                );

                return {
                    left: clamp(
                        Math.round(clientX),
                        TOP_BAR_CONTEXT_MENU_MARGIN,
                        maxLeft,
                    ),
                    top: Math.max(
                        TOP_BAR_HEIGHT + 6,
                        Math.round(clientY),
                    ),
                };
            }

            async function getTauriDpiModule() {
                const customLoader =
                    globalThis.__WINTENDER_TOP_BAR_DPI_MODULE_LOADER__;

                if (typeof customLoader === "function") {
                    return customLoader();
                }

                return import("https://esm.sh/@tauri-apps/api@2.0.2/dpi");
            }

            async function setTopBarContextMenuExpanded(expanded) {
                if (globalThis.__WINTENDER_TOP_BAR_TEST_MODE__) {
                    return;
                }

                const tauriWindow = zebar.currentWidget()?.tauriWindow;

                if (!tauriWindow?.setSize) {
                    return;
                }

                const width =
                    Number.isFinite(window?.innerWidth) && window.innerWidth > 0
                        ? window.innerWidth
                        : TOP_BAR_CONTEXT_MENU_WIDTH +
                          TOP_BAR_CONTEXT_MENU_MARGIN * 2;
                const contextMenuHeight =
                    Math.max(
                        1,
                        elements.topBarContextMenu?.children?.length ?? 0,
                    ) *
                        34 +
                    12;
                const height = expanded
                    ? TOP_BAR_HEIGHT +
                      contextMenuHeight +
                      TOP_BAR_CONTEXT_MENU_MARGIN * 2
                    : TOP_BAR_HEIGHT;

                try {
                    const { LogicalSize } = await getTauriDpiModule();
                    await tauriWindow.setSize(new LogicalSize(width, height));
                } catch (error) {
                    console.error(
                        "Failed to resize top bar for context menu",
                        error,
                    );
                }
            }

            function openTopBarContextMenu({
                clientX = 0,
                clientY = 0,
            } = {}) {
                const menu = createTopBarContextMenu();
                const position = getTopBarContextMenuPosition(clientX, clientY);

                menu.style.left = `${position.left}px`;
                menu.style.top = `${position.top}px`;
                toggleHidden(menu, false);
                state.topBarContextMenuOpen = true;
                void setTopBarContextMenuExpanded(true);
            }

            function closeTopBarContextMenu() {
                const menu = elements.topBarContextMenu;

                if (!menu) {
                    state.topBarContextMenuOpen = false;
                    return;
                }

                toggleHidden(menu, true);
                state.topBarContextMenuOpen = false;
                void setTopBarContextMenuExpanded(false);
            }

            async function getTauriWebviewWindowModule() {
                const customLoader =
                    globalThis.__WINTENDER_TOP_BAR_WEBVIEW_WINDOW_LOADER__;

                if (typeof customLoader === "function") {
                    return customLoader();
                }

                return import(
                    "https://esm.sh/@tauri-apps/api@2.0.2/webviewWindow"
                );
            }

            async function waitForWebviewWindowCreation(webviewWindow) {
                if (!webviewWindow?.once) {
                    return;
                }

                let timeoutId = null;

                await new Promise((resolve, reject) => {
                    timeoutId = setTimeout(() => {
                        reject(
                            new Error(
                                "Timed out while creating settings window",
                            ),
                        );
                    }, ZEBAR_SETTINGS_WINDOW_TIMEOUT_MS);

                    webviewWindow.once("tauri://created", resolve);
                    webviewWindow.once("tauri://error", (error) => {
                        reject(
                            new Error(
                                normalizeText(error?.payload) ||
                                    "Failed to create settings window",
                            ),
                        );
                    });
                }).finally(() => {
                    if (timeoutId) {
                        clearTimeout(timeoutId);
                    }
                });
            }

            async function openTaskManager(
                launcher = () => zebar.shellSpawn(TASK_MANAGER_PROGRAM, []),
            ) {
                try {
                    await launcher();
                } catch (error) {
                    console.error("Failed to open Task Manager", error);
                }
            }

                    height: `${WINTENDER_SETTINGS_HEIGHT}px`,
                    monitorSelection: { type: "primary" },
                    dockToEdge: {

                    await zebar.startWidgetPreset(
