            function parsePowerAvailabilityOutput(output) {
                const normalizedOutput = String(output ?? "").replace(/\r/g, "");
                const availableSection =
                    normalizedOutput.match(
                        /The following sleep states are available on this system:\s*([\s\S]*?)(?:The following sleep states are not available on this system:|$)/i,
                    )?.[1] ?? "";
                const unavailableSection =
                    normalizedOutput.match(
                        /The following sleep states are not available on this system:\s*([\s\S]*)$/i,
                    )?.[1] ?? "";
                const availableBlocks =
                    parsePowercfgStateBlocks(availableSection);
                const unavailableBlocks =
                    parsePowercfgStateBlocks(unavailableSection);
                const availableStandby = findPowercfgStateBlock(
                    availableBlocks,
                    /^Standby\b/i,
                );
                const unavailableStandby = findPowercfgStateBlock(
                    unavailableBlocks,
                    /^Standby\b/i,
                );
                const availableHibernate = findPowercfgStateBlock(
                    availableBlocks,
                    /^Hibernate\b/i,
                );
                const unavailableHibernate = findPowercfgStateBlock(
                    unavailableBlocks,
                    /^Hibernate\b/i,
                );

                return {
                    sleepSupported: availableStandby
                        ? true
                        : unavailableStandby
                          ? false
                          : null,
                    hibernateSupported: availableHibernate
                        ? true
                        : unavailableHibernate
                          ? false
                          : null,
                    modernStandbySupported: availableStandby
                        ? /S0 Low Power Idle/i.test(
                              availableStandby.name ?? "",
                          )
                        : null,
                    reasonsByAction: {
                        sleep: normalizeText(
                            unavailableStandby?.reasons?.join(" "),
                        ),
                        hibernate: normalizeText(
                            unavailableHibernate?.reasons?.join(" "),
                        ),
                    },
                    checkedAt: Date.now(),
                };
            }

            function shouldRefreshPowerAvailability(now = Date.now()) {
                return (
                    !Number.isFinite(state.powerAvailability.checkedAt) ||
                    state.powerAvailability.checkedAt <= 0 ||
                    now - state.powerAvailability.checkedAt >=
                        POWER_AVAILABILITY_CACHE_DURATION_MS
                );
            }

            function updatePowerMenuAvailability() {
                const availability = state.powerAvailability;
                const sleepItem = getPowerActionItem("sleep");
                const hibernateItem = getPowerActionItem("hibernate");

                if (sleepItem) {
                    toggleHidden(sleepItem, availability.sleepSupported === false);
                }

                if (hibernateItem) {
                    toggleHidden(hibernateItem, availability.hibernateSupported === false);
                }

                if (state.powerMenuOpen) {
                    void syncTopBarOverlaySize();
                }
            }

            async function refreshPowerAvailability() {
                if (state.powerAvailabilityRequest) {
                    return state.powerAvailabilityRequest;
                }

                if (!shouldRefreshPowerAvailability()) {
                    updatePowerMenuAvailability();
                    return state.powerAvailability;
                }

                state.powerAvailabilityRequest = (async () => {
                    try {
                        const result = await zebar.shellExec("powercfg.exe", "/a");

                        state.powerAvailability = parsePowerAvailabilityOutput(
                            result.stdout,
                        );
                        updatePowerMenuAvailability();
                    } catch (error) {
                        state.powerAvailability = {
                            ...state.powerAvailability,
                            checkedAt: Date.now(),
                        };

                        if (state.powerMenuOpen) {
                            setPowerMenuStatus(
                                `Could not verify Sleep/Hibernate support: ${
                                    normalizeText(error?.message) ||
                                    "Unknown error."
                                }`,
                            );
                        }

                        console.error(
                            "Failed to refresh power availability",
                            error,
                        );
                    } finally {
                        state.powerAvailabilityRequest = null;
                    }

                    return state.powerAvailability;
                })();

                return state.powerAvailabilityRequest;
            }

            function shouldHandleTopBarContextMenu(target) {
                if (!state.topBarContextMenuOpen && !elements.topBarContextMenu) {
                    createTopBarContextMenu();
                }

                if (!(target instanceof HTMLElement)) {
                    return true;
                }

                if (elements.topBarContextMenu?.contains(target)) {
                    return false;
                }

                if (elements.systray?.contains(target)) {
                    return false;
                }

                return document.body.contains(target);
            }

            function getTopBarContextMenuPosition(clientX = 0, clientY = 0) {
                const viewportWidth =
                    Number.isFinite(window?.innerWidth) &&
                    window.innerWidth > 0
                        ? window.innerWidth
                        : TOP_BAR_CONTEXT_MENU_WIDTH +
                          TOP_BAR_CONTEXT_MENU_MARGIN * 2;
                const maxLeft = Math.max(
                    TOP_BAR_CONTEXT_MENU_MARGIN,
                    viewportWidth -
                        TOP_BAR_CONTEXT_MENU_WIDTH -
                        TOP_BAR_CONTEXT_MENU_MARGIN,
                );

                return {
                    left: clamp(
                        Math.round(clientX),
                        TOP_BAR_CONTEXT_MENU_MARGIN,
                        maxLeft,
                    ),
                    top: Math.max(
                        TOP_BAR_HEIGHT + 6,
                        Math.round(clientY),
                    ),
                };
            }

            function getPowerMenuPosition() {
                const menu = createPowerMenu();
                const buttonRect =
                    typeof elements.power?.getBoundingClientRect === "function"
                        ? elements.power.getBoundingClientRect()
                        : null;
                const menuRect =
                    typeof menu.getBoundingClientRect === "function"
                        ? menu.getBoundingClientRect()
                        : null;
                const menuWidth =
                    Number.isFinite(menuRect?.width) && menuRect.width > 0
                        ? Math.ceil(menuRect.width)
                        : POWER_MENU_WIDTH;
                const viewportWidth =
                    Number.isFinite(window?.innerWidth) &&
                    window.innerWidth > 0
                        ? window.innerWidth
                        : POWER_MENU_WIDTH + POWER_MENU_MARGIN * 2;
                const maxLeft = Math.max(
                    POWER_MENU_MARGIN,
                    viewportWidth - menuWidth - POWER_MENU_MARGIN,
                );
                const buttonLeft = Number.isFinite(buttonRect?.left)
                    ? Math.round(buttonRect.left)
                    : POWER_MENU_MARGIN;
                const buttonBottom = Number.isFinite(buttonRect?.bottom)
                    ? Math.round(buttonRect.bottom)
                    : TOP_BAR_HEIGHT;

                return {
                    left: clamp(buttonLeft, POWER_MENU_MARGIN, maxLeft),
                    top: Math.max(TOP_BAR_HEIGHT + 6, buttonBottom + 6),
                };
            }

            async function getTauriDpiModule() {
                const customLoader =
                    globalThis.__WINTENDER_TOP_BAR_DPI_MODULE_LOADER__;

                if (typeof customLoader === "function") {
                    return customLoader();
                }

                return import("https://esm.sh/@tauri-apps/api@2.0.2/dpi");
            }

            function getExpandedTopBarMenu() {
                if (state.powerMenuOpen && elements.powerMenu) {
                    return elements.powerMenu;
                }

                if (state.topBarContextMenuOpen && elements.topBarContextMenu) {
                    return elements.topBarContextMenu;
                }

                return null;
            }

            function getTopBarOverlayWidth(menu) {
                if (Number.isFinite(window?.innerWidth) && window.innerWidth > 0) {
                    return window.innerWidth;
                }

                if (menu === elements.powerMenu) {
                    return POWER_MENU_WIDTH + POWER_MENU_MARGIN * 2;
                }

                return TOP_BAR_CONTEXT_MENU_WIDTH + TOP_BAR_CONTEXT_MENU_MARGIN * 2;
            }

            function getTopBarOverlayHeight(menu) {
                if (!menu) {
                    return TOP_BAR_HEIGHT;
                }

                const rect =
                    typeof menu.getBoundingClientRect === "function"
                        ? menu.getBoundingClientRect()
                        : null;
                const measuredHeight =
                    Number.isFinite(rect?.height) && rect.height > 0
                        ? Math.ceil(rect.height)
                        : null;
                const fallbackHeight =
                    Math.max(1, menu.children?.length ?? 0) * 34 + 12;
                const menuMargin =
                    menu === elements.powerMenu
                        ? POWER_MENU_MARGIN
                        : TOP_BAR_CONTEXT_MENU_MARGIN;

                return (
                    TOP_BAR_HEIGHT +
                    (measuredHeight ?? fallbackHeight) +
                    menuMargin * 2
                );
            }

            async function syncTopBarOverlaySize() {
                if (globalThis.__WINTENDER_TOP_BAR_TEST_MODE__) {
                    return;
                }

                const tauriWindow = zebar.currentWidget()?.tauriWindow;

                if (!tauriWindow?.setSize) {
                    return;
                }

                const expandedMenu = getExpandedTopBarMenu();
                const width = getTopBarOverlayWidth(expandedMenu);
                const height = getTopBarOverlayHeight(expandedMenu);

                try {
                    const { LogicalSize } = await getTauriDpiModule();
                    await tauriWindow.setSize(new LogicalSize(width, height));
                } catch (error) {
                    console.error("Failed to resize top bar overlay", error);
                }
            }

            function openTopBarContextMenu({
                clientX = 0,
                clientY = 0,
            } = {}) {
                closePowerMenu({ skipResize: true });

                const menu = createTopBarContextMenu();
                const position = getTopBarContextMenuPosition(clientX, clientY);

                menu.style.left = `${position.left}px`;
                menu.style.top = `${position.top}px`;
                toggleHidden(menu, false);
                state.topBarContextMenuOpen = true;
                void syncTopBarOverlaySize();
            }

            function closeTopBarContextMenu({ skipResize = false } = {}) {
                const menu = elements.topBarContextMenu;

                if (!menu) {
                    state.topBarContextMenuOpen = false;
                    return;
                }

                toggleHidden(menu, true);
                state.topBarContextMenuOpen = false;

                if (!skipResize) {
                    void syncTopBarOverlaySize();
                }
            }

            function setPowerButtonExpanded(expanded) {
                elements.power?.classList.toggle("interactive-active", expanded);
                elements.power?.setAttribute(
                    "aria-expanded",
                    expanded ? "true" : "false",
                );
            }

            function getPowerActionLabel(action) {
                const labels = {
                    sleep: "Sleep",
                    hibernate: "Hibernate",
                    shutdown: "Shut down",
                    restart: "Restart",
                    "sign-out": "Sign out",
                    lock: "Lock",
                };

                return labels[action] ?? "Power action";
            }

            async function runPowerAction(action) {
                clearPowerMenuStatus();

                if (
                    (action === "sleep" &&
                        state.powerAvailability.sleepSupported === false) ||
                    (action === "hibernate" &&
                        state.powerAvailability.hibernateSupported === false)
                ) {
                    setPowerMenuStatus(
                        `${getPowerActionLabel(action)} is unavailable: ${
                            getPowerActionUnavailableReason(action) ||
                            "This power state is not available on this PC."
                        }`,
                    );
                    return;
                }

                const commands = {
                    "sleep": () =>
                        state.powerAvailability.modernStandbySupported === true
                            ? execPowerShell(
                                  buildModernStandbySleepPowerShellScript(),
                              )
                            : execPowerShell(buildSleepPowerShellScript()),
                    "hibernate": () => zebar.shellExec("shutdown.exe", "/h"),
                    "shutdown": () => zebar.shellExec("shutdown.exe", "/s /t 0"),
                    "restart": () => zebar.shellExec("shutdown.exe", "/r /t 0"),
                    "sign-out": () => zebar.shellExec("shutdown.exe", "/l"),
                    "lock": () => zebar.shellExec("rundll32.exe", "user32.dll,LockWorkStation"),
                };
                const execute = commands[action];

                if (!execute) {
                    return;
                }

                try {
                    await execute();
                    closePowerMenu();
                } catch (error) {
                    setPowerMenuStatus(
                        `${getPowerActionLabel(action)} failed: ${
                            normalizeText(error?.stderr) ||
                            normalizeText(error?.stdout) ||
                            normalizeText(error?.message) ||
                            "Unknown error."
                        }`,
                    );
                    console.error(`Failed to run power action: ${action}`, error);
                }
            }

            function openPowerMenu() {
                if (!state.userSettings.showPower) {
                    return;
                }

                closeTopBarContextMenu({ skipResize: true });

                const menu = createPowerMenu();
                const position = getPowerMenuPosition();

                clearPowerMenuStatus();
                updatePowerMenuAvailability();
                menu.style.left = `${position.left}px`;
                menu.style.top = `${position.top}px`;
                toggleHidden(menu, false);
                state.powerMenuOpen = true;
                setPowerButtonExpanded(true);
                void syncTopBarOverlaySize();
                void refreshPowerAvailability();
            }

            function closePowerMenu({ skipResize = false } = {}) {
                const menu = elements.powerMenu;

                if (!menu) {
                    state.powerMenuOpen = false;
                    setPowerButtonExpanded(false);
                    return;
                }

                toggleHidden(menu, true);
                state.powerMenuOpen = false;
                setPowerButtonExpanded(false);

                if (!skipResize) {
                    void syncTopBarOverlaySize();
                }
            }

            async function getTauriWebviewWindowModule() {
                const customLoader =
                    globalThis.__WINTENDER_TOP_BAR_WEBVIEW_WINDOW_LOADER__;

                if (typeof customLoader === "function") {
                    return customLoader();
                }

                return import(
                    "https://esm.sh/@tauri-apps/api@2.0.2/webviewWindow"
                );
            }

            async function waitForWebviewWindowCreation(webviewWindow) {
                if (!webviewWindow?.once) {
                    return;
                }

                let timeoutId = null;

                await new Promise((resolve, reject) => {
                    timeoutId = setTimeout(() => {
                        reject(
                            new Error(
                                "Timed out while creating settings window",
                            ),
                        );
                    }, ZEBAR_SETTINGS_WINDOW_TIMEOUT_MS);

                    webviewWindow.once("tauri://created", resolve);
                    webviewWindow.once("tauri://error", (error) => {
                        reject(
                            new Error(
                                normalizeText(error?.payload) ||
                                    "Failed to create settings window",
                            ),
                        );
                    });
                }).finally(() => {
                    if (timeoutId) {
                        clearTimeout(timeoutId);
                    }
                });
            }

            async function openTaskManager(
                launcher = () => zebar.shellSpawn(TASK_MANAGER_PROGRAM, []),
            ) {
                try {
                    await launcher();
                } catch (error) {
                    console.error("Failed to open Task Manager", error);
                }
            }

            function getWintenderSettingsPlacement() {
                return {
                    anchor: "top_right",
                    offsetX: "0px",
                    offsetY: "40px",
                    width: `${WINTENDER_SETTINGS_WIDTH}px`,
                    height: `${WINTENDER_SETTINGS_HEIGHT}px`,
                    monitorSelection: { type: "primary" },
                    dockToEdge: {
                        enabled: false,
                        edge: null,
                        windowMargin: "0px",
                    },
                };
            }

            async function openWintenderSettings() {
                const current = zebar.currentWidget();

                try {
                    await zebar.startWidget(
                        "wintender-settings",
                        getWintenderSettingsPlacement(),
                        { packId: current.packId },
                    );
                } catch (error) {
                    console.error(
                        "Dynamic wintender settings launch failed, falling back to preset",
                        error,
                    );
                    await zebar.startWidgetPreset(
                        "wintender-settings",
                        "default",
                        {
                            packId: current.packId,
                        },
                    );
                }
            }

            async function openZebarSettings({
                getZebarSystrayIcon: getZebarTrayIcon = getZebarSystrayIcon,
                systrayOutput = state.latestSystrayOutput,
                triggerZebarSystrayLeftClick: triggerZebarTrayLeftClick =
                    (iconId) =>
                        triggerZebarSystrayLeftClick(iconId, systrayOutput),
                getWindowModule = getTauriWebviewWindowModule,
            } = {}) {
                try {
                    const zebarTrayIcon = getZebarTrayIcon(systrayOutput);

                    if (zebarTrayIcon?.id) {
                        const openedByTray = await triggerZebarTrayLeftClick(
                            zebarTrayIcon.id,
                        );

                        if (openedByTray !== false) {
                            return;
                        }
                    }

                    const { WebviewWindow } = await getWindowModule();
                    const existingWindow = await WebviewWindow.getByLabel(
                        ZEBAR_SETTINGS_WINDOW_LABEL,
                    );

                    if (existingWindow) {
                        await existingWindow.show?.();
                        await existingWindow.unminimize?.();
                        await existingWindow.setFocus?.();
                        return;
                    }

                    const settingsWindow = new WebviewWindow(
                        ZEBAR_SETTINGS_WINDOW_LABEL,
                        {
                            url: "/index.html",
                            title: ZEBAR_SETTINGS_WINDOW_TITLE,
                            visible: true,
                            focus: true,
                            center: true,
                            width: ZEBAR_SETTINGS_WINDOW_WIDTH,
                            height: ZEBAR_SETTINGS_WINDOW_HEIGHT,
                        },
                    );

                    await waitForWebviewWindowCreation(settingsWindow);
                    await settingsWindow.show?.();
                    await settingsWindow.setFocus?.();
                } catch (error) {
                    console.error("Failed to open Zebar settings", error);
                }
            }

            async function runTopBarContextMenuAction(
                action,
                {
                    openTaskManager: taskManagerOpener = openTaskManager,
                    openWintenderSettings: wintenderSettingsOpener =
                        openWintenderSettings,
                    openZebarSettings: zebarSettingsOpener =
                        openZebarSettings,
                } = {},
            ) {
                closeTopBarContextMenu();

                if (action === "task-manager") {
                    await taskManagerOpener();
                    return;
                }

                if (action === "wintender-settings") {
                    await wintenderSettingsOpener();
                    return;
                }

                if (action === "zebar-settings") {
                    await zebarSettingsOpener();
                }
            }

            function handleTopBarContextMenu(event) {
                if (!shouldHandleTopBarContextMenu(event?.target)) {
                    closeTopBarContextMenu();
                    return;
                }

                event.preventDefault();
                openTopBarContextMenu(event);
            }

            function handlePowerButtonClick(event) {
                event.preventDefault();
                event.stopPropagation();

                if (state.powerMenuOpen) {
                    closePowerMenu();
                    return;
                }

                openPowerMenu();
            }

            function handleTopBarOverlayClick(event) {
                if (
                    state.topBarContextMenuOpen &&
                    !elements.topBarContextMenu?.contains(event?.target)
                ) {
                    closeTopBarContextMenu();
                }

                if (
                    state.powerMenuOpen &&
                    !elements.powerMenu?.contains(event?.target) &&
                    !elements.power?.contains(event?.target)
                ) {
                    closePowerMenu();
                }
            }

            function handleTopBarOverlayKeydown(event) {
                if (event?.key !== "Escape") {
                    return;
                }

                closeTopBarContextMenu();
                closePowerMenu();
            }

            function handleTopBarOverlayBlur() {
                closeTopBarContextMenu();
                closePowerMenu();
            }

            function handlePowerButtonKeydown(event) {
                if (event?.key === "Enter" || event?.key === " ") {
                    handlePowerButtonClick(event);
                }
            }

            function setupTopBarMenus() {
                createTopBarContextMenu();
                createPowerMenu();
                elements.power?.addEventListener("click", handlePowerButtonClick);
                elements.power?.addEventListener(
                    "keydown",
                    handlePowerButtonKeydown,
                );
                document.addEventListener(
                    "contextmenu",
                    handleTopBarContextMenu,
                );
                document.addEventListener("click", handleTopBarOverlayClick);
                document.addEventListener("keydown", handleTopBarOverlayKeydown);
                window.addEventListener("blur", handleTopBarOverlayBlur);
            }

            function buildTrayButton(icon, systrayOutput) {
                const button = document.createElement("button");
                const image = document.createElement("img");

                button.className = "tray-button";
                button.title = icon.tooltip || "";
                image.src = icon.iconUrl;
                image.alt = icon.tooltip || "tray icon";

                button.appendChild(image);

                button.addEventListener("mouseenter", () => {
                    systrayOutput.onHoverEnter?.(icon.id);
                });
                button.addEventListener("mouseleave", () => {
                    systrayOutput.onHoverLeave?.(icon.id);
                });
                button.addEventListener("mousemove", () => {
                    systrayOutput.onHoverMove?.(icon.id);
                });
                button.addEventListener("click", (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    systrayOutput.onLeftClick?.(icon.id);
                    closeTrayOverflow();
                });
                button.addEventListener("auxclick", (event) => {
                    if (event.button === 1) {
                        systrayOutput.onMiddleClick?.(icon.id);
                        closeTrayOverflow();
                    }
                });
                button.addEventListener("contextmenu", (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    systrayOutput.onRightClick?.(icon.id);
                    closeTrayOverflow();
                });

                return button;
            }

            function renderDate(dateOutput) {
                elements.datetime.textContent = formatDate(dateOutput?.now);
            }

            function renderMedia(mediaOutput) {
                const mediaState = getMediaState(mediaOutput);
                clearElement(elements.media);

                if (!state.userSettings.showMedia) {
                    toggleHidden(elements.media, true);
                    return;
                }

                if (!mediaState) {
                    toggleHidden(elements.media, true);
                    return;
                }

                elements.media.appendChild(iconSpan(mediaState.icon));
                elements.media.appendChild(
                    textSpan("media-text", mediaState.text),
                );
                toggleHidden(elements.media, false);
            }

            async function focusKomorebiWorkspace(
                command,
                {
                    runCommand = runKomorebicCommand,
                    refreshState = refreshKomorebiState,
                } = {},
            ) {
                if (!command) {
                    return;
                }

                try {
                    await runCommand(command);
                    await refreshState({ force: true });
                } catch (error) {
                    console.error("Failed to focus komorebi workspace", error);
                }
            }

            async function refreshKomorebiState({ force = false } = {}) {
                if (!force && state.komorebiRefreshRequest) {
                    return state.komorebiRefreshRequest;
                }

                const refreshSequence = ++state.komorebiRefreshSequence;
                const request = (async () => {
                    try {
                        const result = await runKomorebicCommand("state");
                        const komorebiOutput = parseKomorebiStateOutput(
                            result.stdout,
                        );

                        if (!komorebiOutput) {
                            return;
                        }

                        if (
                            refreshSequence <
                            state.komorebiAppliedRefreshSequence
                        ) {
                            return;
                        }

                        state.komorebiAppliedRefreshSequence = refreshSequence;
                        state.latestKomorebiOutput = komorebiOutput;
                        state.komorebiLastRefreshAt = Date.now();
                        renderKomorebi(komorebiOutput);
                    } catch (error) {
                        console.error("Failed to refresh komorebi state", error);
                    } finally {
                        if (state.komorebiRefreshRequest === request) {
                            state.komorebiRefreshRequest = null;
                        }
                    }
                })();

                state.komorebiRefreshRequest = request;
                return request;
            }

            function renderKomorebi(komorebiOutput) {
                clearElement(elements.workspaces);

                if (!state.userSettings.showKomorebiWorkspaces) {
                    toggleHidden(elements.workspaces, true);
                    return;
                }

                const items = getKomorebiWorkspaceItems(komorebiOutput);

                if (!items.length) {
                    toggleHidden(elements.workspaces, true);
                    return;
                }

                items.forEach((item) => {
                    const button = document.createElement("button");
                    const command = getKomorebiFocusWorkspaceCommand(
                        komorebiOutput,
                        item.index,
                    );

                    button.className = "pill workspace-pill interactive";
                    button.type = "button";
                    button.title = `Switch to workspace ${item.label}`;

                    if (item.isActive) {
                        button.classList.add("workspace-pill-active");
                    }

                    button.appendChild(
                        textSpan("workspace-text", item.label),
                    );
                    button.addEventListener("click", () => {
                        void focusKomorebiWorkspace(command);
                    });
                    elements.workspaces.appendChild(button);
                });

                toggleHidden(elements.workspaces, false);
            }

            function renderSystray(systrayOutput) {
                clearElement(elements.systray);

                if (!state.userSettings.showSystray) {
                    closeTrayOverflow();
                    toggleHidden(elements.systray, true);
                    return;
                }

                const { pinnedIcons, overflowIcons } =
                    getTrayGroups(systrayOutput);
                const icons = systrayOutput?.icons ?? [];

                if (!icons.length) {
                    closeTrayOverflow();
                    toggleHidden(elements.systray, true);
                    return;
                }

                if (overflowIcons.length) {
                    const overflow = document.createElement("div");
                    const toggle = document.createElement("button");

                    overflow.className = "tray-overflow";
                    toggle.className = "tray-button tray-more";
                    toggle.type = "button";
                    toggle.textContent = `+${overflowIcons.length}`;
                    toggle.title = "More tray icons";
                    toggle.setAttribute("aria-haspopup", "dialog");
                    toggle.addEventListener("click", async (event) => {
                        event.preventDefault();
                        event.stopPropagation();
                        await openTrayPopup(event, overflowIcons.length);
                    });

                    overflow.appendChild(toggle);
                    elements.systray.appendChild(overflow);
                } else {
                    closeTrayOverflow();
                }

                pinnedIcons.forEach((icon) => {
                    elements.systray.appendChild(
                        buildTrayButton(icon, systrayOutput),
                    );
                });

                toggleHidden(elements.systray, false);
            }

            function getZebarSystrayIcon(
                systrayOutput = state.latestSystrayOutput,
            ) {
                const icons = systrayOutput?.icons ?? [];

                return (
                    icons.find((icon) =>
                        normalizeText(icon?.tooltip).startsWith(
                            ZEBAR_TRAY_TOOLTIP_PREFIX,
                        ),
                    ) ?? null
                );
            }

            async function triggerZebarSystrayLeftClick(
                iconId,
                systrayOutput = state.latestSystrayOutput,
            ) {
                if (!iconId || typeof systrayOutput?.onLeftClick !== "function") {
                    return false;
                }

                await systrayOutput.onLeftClick(iconId);
                return true;
            }

            function renderWeather(weatherOutput) {
                if (!state.userSettings.showWeather) {
                    clearElement(elements.weather);
                    toggleHidden(elements.weather, true);
                    return;
                }

                const weatherState = getWeatherState(weatherOutput);
                clearElement(elements.weather);

                if (!weatherState) {
                    toggleHidden(elements.weather, true);
                    return;
                }

                elements.weather.appendChild(iconSpan(weatherState.icon));
                elements.weather.appendChild(
                    textSpan("weather-text", weatherState.text),
                );
                toggleHidden(elements.weather, false);
            }

            function renderNetwork(networkOutput) {
                if (!state.userSettings.showNetwork) {
                    clearElement(elements.network);
                    elements.network.onclick = null;
                    toggleHidden(elements.network, true);
                    return;
                }

                const networkState = getNetworkState(networkOutput, {
                    cellularSignalStrength: state.cellularSignalStrength,
                });
                clearElement(elements.network);
                elements.network.onclick = null;
                elements.network.appendChild(iconSpan(networkState.icon));
                elements.network.appendChild(
                    textSpan("network-text", networkState.text),
                );
                elements.network.onclick = (event) => {
                    void openQuickSettings(event);
                };
                toggleHidden(elements.network, false);
            }

            function renderAudio(audioOutput) {
                if (!state.userSettings.showAudio) {
                    clearElement(elements.audio);
                    elements.audio.onwheel = null;
                    elements.audio.onclick = null;
                    toggleHidden(elements.audio, true);
                    return;
                }

                const audioState = getAudioState(audioOutput);
                clearElement(elements.audio);
                elements.audio.onwheel = null;
                elements.audio.onclick = null;

                if (!audioState) {
                    toggleHidden(elements.audio, true);
                    return;
                }

                elements.audio.appendChild(iconSpan(audioState.icon));
                elements.audio.appendChild(
                    textSpan("audio-text", audioState.text),
                );
                elements.audio.onclick = (event) => {
                    void openQuickSettings(event);
                };
                elements.audio.onwheel = (event) => {
                    event.preventDefault();
                    const direction = event.deltaY > 0 ? -1 : 1;
                    const nextVolume = clamp(
                        audioState.volume + direction * VOLUME_STEP,
                        0,
                        100,
                    );
                    audioOutput.setVolume?.(nextVolume, {
                        deviceId: audioState.deviceId,
                    });
                };

                toggleHidden(elements.audio, false);
            }

            function renderBattery(batteryOutput) {
                if (!state.userSettings.showBattery) {
                    clearElement(elements.battery);
                    elements.battery.onclick = null;
                    elements.battery.classList.toggle("warning", false);
                    toggleHidden(elements.battery, true);
                    return;
                }

                const batteryState = getBatteryState(batteryOutput);
                clearElement(elements.battery);
                elements.battery.onclick = null;
                elements.battery.classList.toggle("warning", false);

                if (!batteryState) {
                    toggleHidden(elements.battery, true);
                    return;
                }

                elements.battery.appendChild(iconSpan(batteryState.icon));
                elements.battery.appendChild(
                    textSpan("battery-text", batteryState.text),
                );
                elements.battery.onclick = (event) => {
                    void openQuickSettings(event);
                };
                elements.battery.classList.toggle(
                    "warning",
                    batteryState.isWarning,
                );
                toggleHidden(elements.battery, false);
            }

            function renderPower() {
                if (!state.userSettings.showPower) {
                    closePowerMenu();
                    toggleHidden(elements.power, true);
                    return;
                }

                toggleHidden(elements.power, false);
            }

            initializeUserSettings();
            setupTopBarMenus();

            const TEST_HOOKS = {
                DEFAULT_USER_SETTINGS,
                applyUserSettings,
                ensureWeatherProvider,
                elements,
                closeTopBarContextMenu,
                closePowerMenu,
                formatClockText,
                getQuickSettingsPlacement,
                getTrayGroups,
                getWeatherState,
                getWintenderSettingsPlacement,
                getUserSettings: () => ({ ...state.userSettings }),
                getZebarSystrayIcon,
                openTaskManager,
                openPowerMenu,
                openTopBarContextMenu,
                openWintenderSettings,
                openZebarSettings,
                openQuickSettings,
                renderDate,
                renderSystray,
                renderWeather,
                renderNetwork,
                renderAudio,
                renderBattery,
                runPowerAction,
                runTopBarContextMenuAction,
                setUserSettings,
                syncTopBarOverlaySize,
                syncUserSettingsFromStorage,
                shouldHandleTopBarContextMenu,
                triggerZebarSystrayLeftClick,
            };

            if (globalThis.__WINTENDER_TOP_BAR_TEST_MODE__) {
                globalThis.__WINTENDER_TOP_BAR_TEST_HOOKS__ = TEST_HOOKS;
            } else {
                setupUserSettingsSync();
                providers.onOutput((output) => {
                    if (output.komorebi) {
                        state.latestKomorebiOutput = output.komorebi;
                    }

                    state.latestDateOutput = output.date;
                    state.latestMediaOutput = output.media;
                    state.latestSystrayOutput = output.systray;
                    state.latestNetworkOutput = output.network;
                    state.latestAudioOutput = output.audio;
                    state.latestBatteryOutput = output.battery;
                    syncUserSettingsFromStorage({ rerender: false });
                    maybeMigrateLegacyPinnedTraySettings(output.systray);
                    renderAllCurrentState();
                    void refreshTrayAppProcessInfo(output.systray);
                    refreshCellularSignalStrength(output.network);
                    void syncKomorebiState();
                });

                providers.onError((errorMap) => {
                    if (errorMap?.komorebi) {
                        state.latestKomorebiOutput = null;
                        renderKomorebi(null);
                        void refreshKomorebiState();
                    }

                    console.error("Zebar provider error", errorMap);
                });

                void refreshKomorebiState();
            }
        </script>
    </body>
</html>
