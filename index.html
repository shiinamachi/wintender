            async function openZebarSettings({
                getZebarSystrayIcon: getZebarTrayIcon = getZebarSystrayIcon,
                systrayOutput = state.latestSystrayOutput,
                triggerZebarSystrayLeftClick: triggerZebarTrayLeftClick =
                    (iconId) =>
                        triggerZebarSystrayLeftClick(iconId, systrayOutput),
                getWindowModule = getTauriWebviewWindowModule,
            } = {}) {
                try {
                    const zebarTrayIcon = getZebarTrayIcon(systrayOutput);

                    if (zebarTrayIcon?.id) {
                        const openedByTray = await triggerZebarTrayLeftClick(
                            zebarTrayIcon.id,
                        );

                        if (openedByTray !== false) {
                            return;
                        }
                    }

                    const { WebviewWindow } = await getWindowModule();
                    const existingWindow = await WebviewWindow.getByLabel(
                        ZEBAR_SETTINGS_WINDOW_LABEL,
                    );

                    if (existingWindow) {
                        await existingWindow.show?.();
                        await existingWindow.unminimize?.();
                        await existingWindow.setFocus?.();
                        return;
                    }

                    const settingsWindow = new WebviewWindow(
                        ZEBAR_SETTINGS_WINDOW_LABEL,
                        {
                            url: "/index.html",
                            title: ZEBAR_SETTINGS_WINDOW_TITLE,
                            visible: true,
                            focus: true,
                            center: true,
                            width: ZEBAR_SETTINGS_WINDOW_WIDTH,
                            height: ZEBAR_SETTINGS_WINDOW_HEIGHT,
                        },
                    );

                    await waitForWebviewWindowCreation(settingsWindow);
                    await settingsWindow.show?.();
                    await settingsWindow.setFocus?.();
                } catch (error) {
                    console.error("Failed to open Zebar settings", error);
                }
            }

            async function runTopBarContextMenuAction(
                action,
                {
                    openTaskManager: taskManagerOpener = openTaskManager,
                    openWintenderSettings: wintenderSettingsOpener =
                        openWintenderSettings,
                    openZebarSettings: zebarSettingsOpener =
                        openZebarSettings,
                } = {},
            ) {
                closeTopBarContextMenu();

                if (action === "task-manager") {
                    await taskManagerOpener();
                    return;
                }

                if (action === "wintender-settings") {
                    await wintenderSettingsOpener();
                    return;
                }

                if (action === "zebar-settings") {
                    await zebarSettingsOpener();
                }
            }

            function handleTopBarContextMenu(event) {
                if (!shouldHandleTopBarContextMenu(event?.target)) {
                    closeTopBarContextMenu();
                    return;
                }

                event.preventDefault();
                openTopBarContextMenu(event);
            }

            function handleTopBarContextMenuClick(event) {
                if (!state.topBarContextMenuOpen) {
                    return;
                }

                if (elements.topBarContextMenu?.contains(event?.target)) {
                    return;
                }

                closeTopBarContextMenu();
            }

            function handleTopBarContextMenuKeydown(event) {
                if (!state.topBarContextMenuOpen) {
                    return;
                }

                if (event?.key === "Escape") {
                    closeTopBarContextMenu();
                }
            }

            function setupTopBarContextMenu() {
                createTopBarContextMenu();
                document.addEventListener(
                    "contextmenu",
                    handleTopBarContextMenu,
                );
                document.addEventListener("click", handleTopBarContextMenuClick);
                document.addEventListener(
                    "keydown",
                    handleTopBarContextMenuKeydown,
                );
                window.addEventListener("blur", closeTopBarContextMenu);
            }

            function buildTrayButton(icon, systrayOutput) {
                const button = document.createElement("button");
                const image = document.createElement("img");

                button.className = "tray-button";
                button.title = icon.tooltip || "";
                image.src = icon.iconUrl;
                image.alt = icon.tooltip || "tray icon";

                button.appendChild(image);

                button.addEventListener("mouseenter", () => {
                    systrayOutput.onHoverEnter?.(icon.id);
                });
                button.addEventListener("mouseleave", () => {
                    systrayOutput.onHoverLeave?.(icon.id);
                });
                button.addEventListener("mousemove", () => {
                    systrayOutput.onHoverMove?.(icon.id);
                });
                button.addEventListener("click", (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    systrayOutput.onLeftClick?.(icon.id);
                    closeTrayOverflow();
                });
                button.addEventListener("auxclick", (event) => {
                    if (event.button === 1) {
                        systrayOutput.onMiddleClick?.(icon.id);
                        closeTrayOverflow();
                    }
                });
                button.addEventListener("contextmenu", (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    systrayOutput.onRightClick?.(icon.id);
                    closeTrayOverflow();
                });

                return button;
            }

            function renderDate(dateOutput) {
                elements.datetime.textContent = formatDate(dateOutput?.now);
            }

            function renderMedia(mediaOutput) {
                const state = getMediaState(mediaOutput);
                clearElement(elements.media);

                if (!state) {
                    toggleHidden(elements.media, true);
                    return;
                }

                elements.media.appendChild(iconSpan(state.icon));
                elements.media.appendChild(textSpan("media-text", state.text));
                toggleHidden(elements.media, false);
            }

            async function focusKomorebiWorkspace(
                command,
                {
                    runCommand = runKomorebicCommand,
                    refreshState = refreshKomorebiState,
                } = {},
            ) {
                if (!command) {
                    return;
                }

                try {
                    await runCommand(command);
                    await refreshState({ force: true });
                } catch (error) {
                    console.error("Failed to focus komorebi workspace", error);
                }
            }

            async function refreshKomorebiState({ force = false } = {}) {
                if (!force && state.komorebiRefreshRequest) {
                    return state.komorebiRefreshRequest;
                }

                const refreshSequence = ++state.komorebiRefreshSequence;
                const request = (async () => {
                    try {
                        const result = await runKomorebicCommand("state");
                        const komorebiOutput = parseKomorebiStateOutput(
                            result.stdout,
                        );

                        if (!komorebiOutput) {
                            return;
                        }

                        if (
                            refreshSequence <
                            state.komorebiAppliedRefreshSequence
                        ) {
                            return;
                        }

                        state.komorebiAppliedRefreshSequence = refreshSequence;
                        state.latestKomorebiOutput = komorebiOutput;
                        state.komorebiLastRefreshAt = Date.now();
                        renderKomorebi(komorebiOutput);
                    } catch (error) {
                        console.error("Failed to refresh komorebi state", error);
                    } finally {
                        if (state.komorebiRefreshRequest === request) {
                            state.komorebiRefreshRequest = null;
                        }
                    }
                })();

                state.komorebiRefreshRequest = request;
                return request;
            }

            function renderKomorebi(komorebiOutput) {
                clearElement(elements.workspaces);

                if (!state.userSettings.showKomorebiWorkspaces) {
                    toggleHidden(elements.workspaces, true);
                    return;
                }

                const items = getKomorebiWorkspaceItems(komorebiOutput);

                if (!items.length) {
                    toggleHidden(elements.workspaces, true);
                    return;
                }

                items.forEach((item) => {
                    const button = document.createElement("button");
                    const command = getKomorebiFocusWorkspaceCommand(
                        komorebiOutput,
                        item.index,
                    );

                    button.className = "pill workspace-pill interactive";
                    button.type = "button";
                    button.title = `Switch to workspace ${item.label}`;

                    if (item.isActive) {
                        button.classList.add("workspace-pill-active");
                    }

                    button.appendChild(
                        textSpan("workspace-text", item.label),
                    );
                    button.addEventListener("click", () => {
                        void focusKomorebiWorkspace(command);
                    });
                    elements.workspaces.appendChild(button);
                });

                toggleHidden(elements.workspaces, false);
            }

            function renderSystray(systrayOutput) {
                clearElement(elements.systray);

                if (!state.userSettings.showSystray) {
                    closeTrayOverflow();
                    toggleHidden(elements.systray, true);
                    return;
                }

                const { pinnedIcons, overflowIcons } =
                    getTrayGroups(systrayOutput);
                const icons = systrayOutput?.icons ?? [];

                if (!icons.length) {
                    closeTrayOverflow();
                    toggleHidden(elements.systray, true);
                    return;
                }

                if (overflowIcons.length) {
                    const overflow = document.createElement("div");
                    const toggle = document.createElement("button");

                    overflow.className = "tray-overflow";
                    toggle.className = "tray-button tray-more";
                    toggle.type = "button";
                    toggle.textContent = `+${overflowIcons.length}`;
                    toggle.title = "More tray icons";
                    toggle.setAttribute("aria-haspopup", "dialog");
                    toggle.addEventListener("click", async (event) => {
                        event.preventDefault();
                        event.stopPropagation();
                        await openTrayPopup(event, overflowIcons.length);
                    });

                    overflow.appendChild(toggle);
                    elements.systray.appendChild(overflow);
                } else {
                    closeTrayOverflow();
                }

                pinnedIcons.forEach((icon) => {
                    elements.systray.appendChild(
                        buildTrayButton(icon, systrayOutput),
                    );
                });

                toggleHidden(elements.systray, false);
            }

            function getZebarSystrayIcon(
                systrayOutput = state.latestSystrayOutput,
            ) {
                const icons = systrayOutput?.icons ?? [];

                return (
                    icons.find((icon) =>
                        normalizeText(icon?.tooltip).startsWith(
                            ZEBAR_TRAY_TOOLTIP_PREFIX,
                        ),
                    ) ?? null
                );
            }

            async function triggerZebarSystrayLeftClick(
                iconId,
                systrayOutput = state.latestSystrayOutput,
            ) {
                if (!iconId || typeof systrayOutput?.onLeftClick !== "function") {
                    return false;
                }

                await systrayOutput.onLeftClick(iconId);
                return true;
            }

            function renderWeather(weatherOutput) {
                if (!state.userSettings.showWeather) {
                    clearElement(elements.weather);
                    toggleHidden(elements.weather, true);
                    return;
                }

                const weatherState = getWeatherState(weatherOutput);
                clearElement(elements.weather);

                if (!weatherState) {
                    toggleHidden(elements.weather, true);
                    return;
                }

                elements.weather.appendChild(iconSpan(weatherState.icon));
                elements.weather.appendChild(
                    textSpan("weather-text", weatherState.text),
                );
                toggleHidden(elements.weather, false);
            }

            function renderNetwork(networkOutput) {
                if (!state.userSettings.showNetwork) {
                    clearElement(elements.network);
                    elements.network.onclick = null;
                    toggleHidden(elements.network, true);
                    return;
                }

                const networkState = getNetworkState(networkOutput, {
                    cellularSignalStrength: state.cellularSignalStrength,
                });
                clearElement(elements.network);
                elements.network.onclick = null;
                elements.network.appendChild(iconSpan(networkState.icon));
                elements.network.appendChild(
                    textSpan("network-text", networkState.text),
                );
                elements.network.onclick = (event) => {
                    void openQuickSettings(event);
                };
                toggleHidden(elements.network, false);
            }

            function renderAudio(audioOutput) {
                if (!state.userSettings.showAudio) {
                    clearElement(elements.audio);
                    elements.audio.onwheel = null;
                    elements.audio.onclick = null;
                    toggleHidden(elements.audio, true);
                    return;
                }

                const audioState = getAudioState(audioOutput);
                clearElement(elements.audio);
                elements.audio.onwheel = null;
                elements.audio.onclick = null;

                if (!audioState) {
                    toggleHidden(elements.audio, true);
                    return;
                }

                elements.audio.appendChild(iconSpan(audioState.icon));
                elements.audio.appendChild(
                    textSpan("audio-text", audioState.text),
                );
                elements.audio.onclick = (event) => {
                    void openQuickSettings(event);
                };
                elements.audio.onwheel = (event) => {
                    event.preventDefault();
                    const direction = event.deltaY > 0 ? -1 : 1;
                    const nextVolume = clamp(
                        audioState.volume + direction * VOLUME_STEP,
                        0,
                        100,
                    );
                    audioOutput.setVolume?.(nextVolume, {
                        deviceId: audioState.deviceId,
                    });
                };

                toggleHidden(elements.audio, false);
            }

            function renderBattery(batteryOutput) {
                if (!state.userSettings.showBattery) {
                    clearElement(elements.battery);
                    elements.battery.onclick = null;
                    elements.battery.classList.toggle("warning", false);
                    toggleHidden(elements.battery, true);
                    return;
                }

                const batteryState = getBatteryState(batteryOutput);
                clearElement(elements.battery);
                elements.battery.onclick = null;
                elements.battery.classList.toggle("warning", false);

                if (!batteryState) {
                    toggleHidden(elements.battery, true);
                    return;
                }

                elements.battery.appendChild(iconSpan(batteryState.icon));
                elements.battery.appendChild(
                    textSpan("battery-text", batteryState.text),
                );
                elements.battery.onclick = (event) => {
                    void openQuickSettings(event);
                };
                elements.battery.classList.toggle(
                    "warning",
                    batteryState.isWarning,
                );
                toggleHidden(elements.battery, false);
            }

            initializeUserSettings();
            setupTopBarContextMenu();

            const TEST_HOOKS = {
                DEFAULT_USER_SETTINGS,
                applyUserSettings,
                ensureWeatherProvider,
                elements,
                closeTopBarContextMenu,
                formatClockText,
                getQuickSettingsPlacement,
                getTrayGroups,
                getWeatherState,
                getWintenderSettingsPlacement,
                getUserSettings: () => ({ ...state.userSettings }),
                getZebarSystrayIcon,
                openTaskManager,
                openTopBarContextMenu,
                openWintenderSettings,
                openZebarSettings,
                openQuickSettings,
                renderDate,
                renderSystray,
                renderWeather,
                renderNetwork,
                renderAudio,
                renderBattery,
                runTopBarContextMenuAction,
                setUserSettings,
                syncUserSettingsFromStorage,
                shouldHandleTopBarContextMenu,
                triggerZebarSystrayLeftClick,
            };

            if (globalThis.__WINTENDER_TOP_BAR_TEST_MODE__) {
                globalThis.__WINTENDER_TOP_BAR_TEST_HOOKS__ = TEST_HOOKS;
            } else {
                setupUserSettingsSync();
                providers.onOutput((output) => {
                    if (output.komorebi) {
                        state.latestKomorebiOutput = output.komorebi;
                    }

                    state.latestDateOutput = output.date;
                    state.latestMediaOutput = output.media;
                    state.latestSystrayOutput = output.systray;
                    state.latestNetworkOutput = output.network;
                    state.latestAudioOutput = output.audio;
                    state.latestBatteryOutput = output.battery;
                    syncUserSettingsFromStorage({ rerender: false });
                    renderAllCurrentState();
                    refreshCellularSignalStrength(output.network);
                    void syncKomorebiState();
                });

                providers.onError((errorMap) => {
                    if (errorMap?.komorebi) {
                        state.latestKomorebiOutput = null;
                        renderKomorebi(null);
                        void refreshKomorebiState();
                    }

                    console.error("Zebar provider error", errorMap);
                });

                void refreshKomorebiState();
            }
        </script>
    </body>
</html>
