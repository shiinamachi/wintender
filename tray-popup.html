<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wintender Tray Popup</title>
    <style>
      :root {
        --popup-bg: rgba(24, 24, 30, 0.94);
        --text-primary: #e0e0e0;
        --hover: rgba(255, 255, 255, 0.1);
        --border: rgba(255, 255, 255, 0.06);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family:
          "JetBrainsMonohangul NF Regular",
          "JetBrainsMono Nerd Font",
          "CaskaydiaCove Nerd Font",
          "Segoe UI",
          monospace;
        color: var(--text-primary);
        user-select: none;
        background: transparent;
      }

      .popup {
        display: flex;
        align-content: flex-start;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 6px;
        width: 100%;
        height: 100%;
        padding: 6px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--popup-bg);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      }

      .tray-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border: 0;
        border-radius: 5px;
        background: transparent;
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .tray-button:hover {
        background: var(--hover);
      }

      .tray-button img {
        width: 16px;
        height: 16px;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="popup" class="popup hidden"></div>

    <script type="module">
      import * as zebar from "https://esm.sh/zebar@3.1.1?bundle";
      import {
        buildTrayAppLookupCommand,
        getTrayAppLookupIds,
        parseTrayAppLookupResponse,
        resolveTrayAppIdentity,
        sanitizePinnedTrayApps,
      } from "./resources/tray-app-identity.mjs";

      const CONTEXT_MENU_BLUR_GRACE_MS = 400;
      const WINTENDER_SETTINGS_STORAGE_KEY = "wintender:settings";
      const DEFAULT_USER_SETTINGS = Object.freeze({
        pinnedTrayApps: [],
      });

      const popup = document.getElementById("popup");
      const widget = zebar.currentWidget();
      const providers = zebar.createProviderGroup({
        systray: { type: "systray" },
      });
      const state = {
        suppressBlurCloseUntil: 0,
        userSettings: { ...DEFAULT_USER_SETTINGS },
        userSettingsStorageRaw: null,
        trayAppProcessInfoByIconId: new Map(),
        trayAppLookupRequest: null,
        latestSystrayOutput: null,
      };

      function clearElement(element) {
        while (element.firstChild) {
          element.removeChild(element.firstChild);
        }
      }

      function normalizeText(text) {
        return typeof text === "string" ? text.trim() : "";
      }

      function mergeUserSettings(rawSettings) {
        const settings = {
          ...DEFAULT_USER_SETTINGS,
        };

        if (Array.isArray(rawSettings?.pinnedTrayApps)) {
          settings.pinnedTrayApps = sanitizePinnedTrayApps(
            rawSettings.pinnedTrayApps,
          );
        }

        return settings;
      }

      function safeJsonParse(text) {
        if (typeof text !== "string" || !text.trim()) {
          return null;
        }

        try {
          return JSON.parse(text);
        } catch (error) {
          console.error("Failed to parse wintender settings", error);
          return null;
        }
      }

      function syncUserSettingsFromStorage(
        storage = globalThis.localStorage,
      ) {
        if (typeof storage?.getItem !== "function") {
          state.userSettings = mergeUserSettings(null);
          state.userSettingsStorageRaw = null;
          return state.userSettings;
        }

        const raw = storage.getItem(WINTENDER_SETTINGS_STORAGE_KEY);

        if (raw === state.userSettingsStorageRaw) {
          return state.userSettings;
        }

        const parsedSettings = safeJsonParse(raw);
        state.userSettings = mergeUserSettings(parsedSettings);
        state.userSettingsStorageRaw = raw;

        return state.userSettings;
      }

      function setUserSettings(nextSettings) {
        state.userSettings = mergeUserSettings(nextSettings);
        return state.userSettings;
      }

      function getResolvedTrayAppProcessInfo(icon) {
        const iconId = normalizeText(icon?.id);

        if (!iconId) {
          return null;
        }

        return state.trayAppProcessInfoByIconId.get(iconId) ?? null;
      }

      function getTrayAppIdentity(icon) {
        return resolveTrayAppIdentity(icon, getResolvedTrayAppProcessInfo(icon));
      }

      function getTrayAppFallbackIdentity(icon) {
        return resolveTrayAppIdentity(icon, null);
      }

      async function refreshTrayAppProcessInfo(
        systrayOutput = state.latestSystrayOutput,
      ) {
        const lookupIconIds = getTrayAppLookupIds(
          systrayOutput?.icons ?? [],
          state.trayAppProcessInfoByIconId,
        );

        if (!lookupIconIds.length || state.trayAppLookupRequest) {
          return state.trayAppLookupRequest;
        }

        const command = buildTrayAppLookupCommand(lookupIconIds);

        if (!command) {
          return null;
        }

        state.trayAppLookupRequest = (async () => {
          try {
            const result = await zebar.shellExec(
              "powershell.exe",
              `-NoProfile -NonInteractive -WindowStyle Hidden -Command ${command}`,
            );
            const resolvedProcessInfoByIconId =
              parseTrayAppLookupResponse(result.stdout);

            lookupIconIds.forEach((iconId) => {
              const resolvedProcessInfo =
                resolvedProcessInfoByIconId.get(iconId) ?? null;

              if (resolvedProcessInfo) {
                state.trayAppProcessInfoByIconId.set(
                  iconId,
                  resolvedProcessInfo,
                );
              } else {
                state.trayAppProcessInfoByIconId.delete(iconId);
              }
            });

            renderPopup(state.latestSystrayOutput);
          } catch (error) {
            lookupIconIds.forEach((iconId) => {
              state.trayAppProcessInfoByIconId.delete(iconId);
            });
            console.error("Failed to resolve tray app identities", error);
          } finally {
            state.trayAppLookupRequest = null;
          }
        })();

        return state.trayAppLookupRequest;
      }

      function isPinnedTrayIcon(icon) {
        const identity = getTrayAppIdentity(icon);
        const fallbackIdentity = getTrayAppFallbackIdentity(icon);
        return [identity, fallbackIdentity].some(
          (candidateIdentity) =>
            candidateIdentity &&
            state.userSettings.pinnedTrayApps.includes(candidateIdentity),
        );
      }

      function getVisibleOverflowIcons(systrayOutput) {
        return (systrayOutput?.icons ?? []).filter(
          (icon) => !isPinnedTrayIcon(icon),
        );
      }

      function shouldClosePopupOnTrayInteraction(action) {
        return action === "left" || action === "middle";
      }

      function getBlurCloseSuppressionUntil(now = Date.now()) {
        return now + CONTEXT_MENU_BLUR_GRACE_MS;
      }

      function shouldClosePopupOnBlur(suppressionUntil, now = Date.now()) {
        return now >= suppressionUntil;
      }

      async function closePopup() {
        await widget.close();
      }

      function renderPopup(systrayOutput = state.latestSystrayOutput) {
        const icons = getVisibleOverflowIcons(systrayOutput);

        clearElement(popup);

        if (!icons.length) {
          void closePopup();
          return;
        }

        icons.forEach((icon) => {
          popup.appendChild(buildTrayButton(icon, systrayOutput));
        });

        popup.classList.remove("hidden");
      }

      function buildTrayButton(icon, systrayOutput) {
        const button = document.createElement("button");
        const image = document.createElement("img");

        button.className = "tray-button";
        button.type = "button";
        button.title = icon.tooltip || "";
        image.src = icon.iconUrl;
        image.alt = icon.tooltip || "tray icon";
        button.appendChild(image);

        button.addEventListener("mouseenter", () => {
          systrayOutput.onHoverEnter?.(icon.id);
        });
        button.addEventListener("mouseleave", () => {
          systrayOutput.onHoverLeave?.(icon.id);
        });
        button.addEventListener("mousemove", () => {
          systrayOutput.onHoverMove?.(icon.id);
        });
        button.addEventListener("click", async (event) => {
          event.preventDefault();
          event.stopPropagation();
          systrayOutput.onLeftClick?.(icon.id);

          if (shouldClosePopupOnTrayInteraction("left")) {
            await closePopup();
          }
        });
        button.addEventListener("auxclick", async (event) => {
          if (event.button === 1) {
            systrayOutput.onMiddleClick?.(icon.id);

            if (shouldClosePopupOnTrayInteraction("middle")) {
              await closePopup();
            }
          }
        });
        button.addEventListener("contextmenu", async (event) => {
          event.preventDefault();
          event.stopPropagation();
          state.suppressBlurCloseUntil = getBlurCloseSuppressionUntil();
          systrayOutput.onRightClick?.(icon.id);

          if (shouldClosePopupOnTrayInteraction("right")) {
            await closePopup();
          }
        });

        return button;
      }

      const TEST_HOOKS = {
        getVisibleOverflowIcons,
        setUserSettings,
        syncUserSettingsFromStorage,
      };

      if (globalThis.__WINTENDER_TRAY_POPUP_TEST_MODE__) {
        globalThis.__WINTENDER_TRAY_POPUP_TEST_HOOKS__ = TEST_HOOKS;
      } else {
        syncUserSettingsFromStorage();
      }

      providers.onOutput((output) => {
        state.latestSystrayOutput = output.systray;
        syncUserSettingsFromStorage();
        renderPopup(output.systray);
        void refreshTrayAppProcessInfo(output.systray);
      });

      providers.onError((error) => {
        console.error("Tray popup provider error", error);
      });

      widget.tauriWindow.listen("tauri://blur", () => {
        if (!shouldClosePopupOnBlur(state.suppressBlurCloseUntil)) {
          return;
        }

        closePopup();
      });
    </script>
  </body>
</html>
