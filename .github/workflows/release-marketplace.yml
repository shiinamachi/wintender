name: Release And Publish

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  release-and-publish:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'develop' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body || '' }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          PACK_NAME="$(node -p "require('./zpack.json').name")"
          VERSION="$(node -p "require('./zpack.json').version")"
          TAG_NAME="v${VERSION}"
          PACKAGE_NAME="${PACK_NAME}-${TAG_NAME}.tar.gz"
          RELEASE_NAME="${PACK_NAME} ${TAG_NAME}"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG_NAME}"

          {
            echo "pack_name=${PACK_NAME}"
            echo "version=${VERSION}"
            echo "tag_name=${TAG_NAME}"
            echo "package_name=${PACKAGE_NAME}"
            echo "release_name=${RELEASE_NAME}"
            echo "release_url=${RELEASE_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Build release notes
        shell: bash
        run: |
          set -euo pipefail

          : > release-notes.md
          printf '%s\n\n' "$PR_TITLE" >> release-notes.md

          if [ -n "$PR_BODY" ]; then
            printf '%s\n\n' "$PR_BODY" >> release-notes.md
          fi

          printf 'Merged PR: #%s\n' "$PR_NUMBER" >> release-notes.md
          printf 'Source branch: develop\n' >> release-notes.md
          printf 'Target branch: main\n' >> release-notes.md
          printf 'Merge commit: %s\n' "$MERGE_COMMIT_SHA" >> release-notes.md

      - name: Ensure version has not been released
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse "${{ steps.meta.outputs.tag_name }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.meta.outputs.tag_name }} already exists." >&2
            echo "Bump zpack.json version before merging develop into main." >&2
            exit 1
          fi

      - name: Package widget pack
        id: package
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob globstar

          mkdir -p dist

          {
            printf 'zpack.json\n'
            node -e "const z=require('./zpack.json'); for (const image of z.previewImages || []) console.log(String(image).replace(/^\\.\\//, ''));"
            find . -maxdepth 1 -type f \( -iname 'README.md' -o -iname 'README' -o -iname 'LICENSE.md' -o -iname 'LICENSE.txt' -o -iname 'LICENSE' \) -printf '%P\n'
          } > .release-files

          node -e "const z=require('./zpack.json'); const patterns=[...new Set((z.widgets || []).flatMap(widget => widget.includeFiles || []))]; for (const pattern of patterns) console.log(pattern);" > .include-patterns

          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            matches=( $pattern )
            [ "${#matches[@]}" -eq 0 ] && continue
            printf '%s\n' "${matches[@]}" >> .release-files
          done < .include-patterns

          LC_ALL=C sort -u .release-files > .release-files.sorted

          PACKAGE_PATH="dist/${{ steps.meta.outputs.package_name }}"
          tar -czf "$PACKAGE_PATH" -T .release-files.sorted

          echo "package_path=${PACKAGE_PATH}" >> "$GITHUB_OUTPUT"
          echo "Packaged files:"
          tar -tzf "$PACKAGE_PATH"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ env.MERGE_COMMIT_SHA }}
          name: ${{ steps.meta.outputs.release_name }}
          body_path: release-notes.md
          append_body: true
          generate_release_notes: true
          files: ${{ steps.package.outputs.package_path }}
          overwrite_files: true

      - name: Publish to Zebar Marketplace
        env:
          ZEBAR_PUBLISH_TOKEN: ${{ secrets.ZEBAR_PUBLISH_TOKEN }}
          RELEASE_URL: ${{ steps.meta.outputs.release_url }}
          PACKAGE_PATH: ${{ steps.package.outputs.package_path }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${ZEBAR_PUBLISH_TOKEN:-}" ]; then
            echo "ZEBAR_PUBLISH_TOKEN secret is required." >&2
            exit 1
          fi

          RESPONSE_FILE="$(mktemp)"

          HTTP_CODE="$(
            curl -sS -o "$RESPONSE_FILE" -w '%{http_code}' \
              -X POST 'https://api.glzr.io/v1/trpc/widgetPack.publishVersion' \
              -H "X-API-TOKEN: ${ZEBAR_PUBLISH_TOKEN}" \
              -F "packConfig=@zpack.json;type=application/json" \
              -F "tarball=@${PACKAGE_PATH}" \
              -F "commitSha=${MERGE_COMMIT_SHA}" \
              -F "releaseUrl=${RELEASE_URL}" \
              -F "releaseNotes=<release-notes.md"
          )"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Marketplace publish request failed with HTTP ${HTTP_CODE}." >&2
            cat "$RESPONSE_FILE" >&2
            exit 1
          fi

          node - "$RESPONSE_FILE" <<'NODE'
          const fs = require('fs');

          const responsePath = process.argv[2];
          const raw = fs.readFileSync(responsePath, 'utf8');
          const payload = JSON.parse(raw);
          const published = payload?.result?.data?.json?.widget_pack;

          if (published?.published_id && published?.latest_version) {
            console.log(
              `Published ${published.published_id}@${published.latest_version} to Zebar Marketplace.`,
            );
            process.exit(0);
          }

          const message =
            payload?.error?.json?.message ||
            payload?.error?.message ||
            'Unknown marketplace publish error.';

          console.error(message);
          process.exit(1);
          NODE
